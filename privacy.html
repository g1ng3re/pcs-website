h a legal obligation", "Necessary for our legitimate interests (for running our business, provision of administration and IT services, network security, to prevent fraud and in the context of a business reorganisation or group restructuring exercise)"]], ["To use data analytics to improve our website, products / services, marketing, customer relationships and experiences", ["Technical", "Profile & Usage"], ["Necessary for our legitimate interests (to analyse customer usage, update our website, to develop our business and to inform our marketing strategy)"]]]

ange happens to our business, then the new owners may use your personal data in the same way as set out in this privacy notice."]]

  }, {

  }, {

    list: [["Functionality", "we use these cookies so that we recognise you on our website and remember your previously selected preferences. These could include what language you prefer and the location you are in. A mix of first-party and third-party cookies are used."], ["Advertising", "we use these cookies to collect information about your visit to our website, the content you viewed, the links you followed and information about your browser, device, and your IP address. We sometimes share some limited aspects of this data with third parties for advertising purposes."]]
  }, {

  }, {

  }, {
