      <div className="art-hero">
        <div className="art-hero-i">
          <a href="../blog" style={{font:"700 12px var(--font-sans)",color:"rgba(255,255,255,.4)",textDecoration:"none",display:"inline-block",marginBottom:16}}>← Blog</a>
          <div><span className="art-cat">Mortgages</span></div>
          <h1 style={{font:"900 clamp(28px,4vw,44px)/1.1 var(--font-display)",color:"#fff",letterSpacing:"-.02em",margin:"14px 0 0"}}>Self-employed mortgage: how lenders actually assess your income</h1>
          <div style={{font:"500 13px var(--font-sans)",color:"rgba(255,255,255,.4)",marginTop:14,display:"flex",gap:16}}><span>6 min read</span><span>Mortgages</span></div>
        </div>
      </div>
      <article className="art-body">
        <p>If you're self-employed and thinking about getting a mortgage, you've probably been told it's harder. And it is, but not for the reason most people think.</p>
        <p>The difficulty isn't that lenders don't want to lend to self-employed people. It's that they need to verify your income differently. Once you understand what they want and have it ready, the process is far more straightforward than the horror stories suggest.</p>

        <h2>How lenders see you</h2>
        <p>Lenders want to know two things: how much you earn, and how reliable that income is. For a salaried employee, both are easy to verify. For a self-employed person, they need to look at your track record.</p>
        <p>In most cases, lenders will want to see at least two years of self-employed income history. Some will consider one year if everything else about your application is strong, but two is the standard and three gives you more options.</p>

        <h2>Sole trader vs limited company director: it matters</h2>
        <h3>If you're a sole trader</h3>
        <p>Lenders will typically use your net profit: the figure on your SA302 (the summary of your Self Assessment tax return). They'll often average the last two or three years. If your income has been rising, some lenders will use the most recent year only; if it's dropped, they'll usually average or use the lower figure.</p>

        <h3>If you're a limited company director</h3>
        <p>This is where it gets more nuanced. Most directors pay themselves a low salary and draw the rest as dividends (often for tax efficiency). Lenders generally assess your income as salary plus dividends. Some lenders, particularly the more specialist ones, will also consider your share of the company's net profit, which can significantly increase the income they'll lend against.</p>

        <div className="art-pull">The way you structure your income for tax efficiency may not be the same structure that maximises your borrowing power. A good broker will know which lenders look at what.</div>

        <h2>What documents you'll need</h2>
        <ul className="chk">
          <li>SA302 forms for the last 2–3 tax years (from your HMRC online account or accountant)</li>
          <li>HMRC tax year overviews for the same years</li>
          <li>For limited company directors: company accounts for the last 2–3 years, certified by an accountant</li>
          <li>Business bank statements (usually 3–6 months)</li>
          <li>Personal bank statements (3 months)</li>
          <li>Proof of ID and address</li>
        </ul>

        <h2>The one thing that catches people out</h2>
        <div className="art-warn"><strong>⚠️ Don't reduce your income artificially just before applying.</strong> Many self-employed people minimise their declared income for tax purposes, which is perfectly legal. But if you're planning to apply for a mortgage in the next 12–18 months, talk to your accountant before doing anything that would reduce the income on your SA302. A bigger tax bill this year might unlock a much larger mortgage next year.</div>

        <h2>How much can you borrow?</h2>
        <p>Most lenders use an income multiple of 4–4.5x your income. Some will go to 5x or even 5.5x in the right circumstances. With a verified income of £60,000, you could potentially borrow £270,000–£330,000 depending on your outgoings and credit profile.</p>
        <p>The key phrase is "verified income": what the lender accepts, not what you actually earn. This is why preparation matters.</p>

        <div className="art-tip"><strong>Use a broker who specialises in self-employed mortgages.</strong> Not all lenders appear on comparison sites, and the criteria vary significantly between lenders. A broker who knows the market can match your specific income structure to the right lender, potentially unlocking far more than a high-street application would.</div>
      </article>
