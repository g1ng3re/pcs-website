<script type="text/babel" data-presets="react">
const K = window.PCSKit;

  { href:"death-in-service", cat:"p", catLabel:"Protection", accent:"var(--pcs-emerald)", title:"Why your death in service from work probably isn't enough", excerpt:"Most people assume their employer's death in service covers them. It doesn't — at least not properly. Here's what it actually is, what it isn't, and why it shouldn't be your plan.", mins:5 },
  { href:"income-protection", cat:"p", catLabel:"Protection", accent:"var(--pcs-blue)", title:"What is income protection and do I actually need it?", excerpt:"If you stopped working tomorrow — illness, injury, anything — how long could you last on savings? Income protection is the policy nobody thinks about until it's too late.", mins:6 },
  { href:"how-much-life-cover", cat:"p", catLabel:"Protection", accent:"var(--pcs-gold)", title:"How much life cover do I need? The honest answer", excerpt:"The \"10x your salary\" rule is lazy and often wrong. The honest answer depends on four questions about your actual situation — not a formula someone pulled from thin air.", mins:5 },
  { href:"self-employed-mortgage", cat:"m", catLabel:"Mortgages", accent:"var(--pcs-blue)", title:"Self-employed mortgage: how lenders actually assess your income", excerpt:"Being self-employed doesn't stop you getting a mortgage. It just means lenders look at your income differently. Here's exactly what they want to see — and what trips people up.", mins:6 },
  { href:"first-time-buyer-guide", cat:"m", catLabel:"Mortgages", accent:"var(--pcs-emerald)", title:"First-time buyer: what actually happens between offer and keys", excerpt:"Most first-time buyers know they need a deposit and a mortgage. What nobody tells you is what happens in between — and why it takes longer than you think.", mins:7 },
];

function BlogIndex() {
  return (
    <React.Fragment>
      <div className="blog-hero">
        <div className="blog-hero-i">
          <span className="pcs-eyebrow" style={{color:"var(--pcs-emerald)"}}>Knowledge Hub</span>

          <p style={{fontSize:18,color:"rgba(255,255,255,.55)",maxWidth:520,lineHeight:1.65,margin:0}}>Plain-English guides on mortgages, protection, and property finance. No jargon. No pressure. Just the information you need to make better decisions.</p>
        </div>
      </div>

      <section style={{background:"var(--surface-page)",padding:"60px 28px 80px"}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div className="blog-grid">

                <div className="bcard-body">
                  <span className={`bcard-cat ${a.cat==='p'?'cat-p':'cat-m'}`}>{a.catLabel}</span>
