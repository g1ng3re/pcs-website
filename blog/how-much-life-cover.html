function Article() {
  return (
    <React.Fragment>
      <div className="art-hero">
        <div className="art-hero-i">
          <a href="../blog" style={{font:"700 12px var(--font-sans)",color:"rgba(255,255,255,.4)",textDecoration:"none",display:"inline-block",marginBottom:16}}>← Blog</a>
          <div><span className="art-cat">Protection</span></div>
          <h1 style={{font:"900 clamp(28px,4vw,44px)/1.1 var(--font-display)",color:"#fff",letterSpacing:"-.02em",margin:"14px 0 0"}}>How much life cover do I need? The honest answer</h1>
          <div style={{font:"500 13px var(--font-sans)",color:"rgba(255,255,255,.4)",marginTop:14,display:"flex",gap:16}}><span>5 min read</span><span>Protection</span></div>
        </div>
      </div>
      <article className="art-body">
        <p>At some point, someone probably told you a rule of thumb: "Get life cover worth 10 times your salary." It sounds sensible. It's easy to remember. And it's often completely wrong for your situation.</p>
        <p>Life insurance is not a salary calculation. It's about what the money needs to do. And "10x your salary" could leave your family massively over-insured in one area and dangerously under-covered in another. Here's a better framework.</p>

        <h2>Start with what the money needs to do</h2>
        <p>When you buy life insurance, you're answering a specific question: if I died today, what financial consequences would my family face, and how much money would they need to weather them? That question has four parts.</p>

        <div className="q-box"><div className="q-num">1</div><div><h4>Clear the debts</h4><p>Start with your mortgage — the biggest liability most families carry. If you have a £280,000 mortgage, the policy needs to cover at least that. Add any other significant debts: loans, credit cards, a business liability.</p></div></div>
        <div className="q-box"><div className="q-num">2</div><div><h4>Replace the income</h4><p>How many years of your income would your family need to maintain their lifestyle without you? Think about your dependants, their ages, and when they'd become financially independent. 5 years? 10? Until the youngest finishes education?</p></div></div>
        <div className="q-box"><div className="q-num">3</div><div><h4>Cover the childcare gap</h4><p>Often missed. If you're the primary carer and your partner works, your death creates a childcare cost. If you're the breadwinner, your partner may need to reduce their hours. That's a financial hit that needs to be accounted for.</p></div></div>
        <div className="q-box"><div className="q-num">4</div><div><h4>Account for what already exists</h4><p>Death in service, existing policies, partner's income, assets. The amount of cover you need is the gap between what you have and what your family would need.</p></div></div>

        <div className="art-pull">The goal isn't to make your family wealthy. It's to make sure they're not financially destroyed.</div>

        <h2>A worked example</h2>
        <p>Say you're 38, earning £55,000, with a £300,000 mortgage, two young children, and a partner who earns £28,000. Your death in service is 3x salary (£165,000).</p>
        <ul>
          <li>Mortgage to clear: £300,000</li>
          <li>Income replacement (10 years × £55,000): £550,000</li>
          <li>Childcare costs: £50,000</li>
          <li>Total needed: £900,000</li>
          <li>Death in service: −£165,000</li>
          <li>Cover gap: £735,000</li>
        </ul>
        <p>Under the "10x salary" rule you'd get £550,000 — and you'd still be £350,000 short on the mortgage and childcare alone. This is why the formula is dangerous.</p>

        <h2>Term vs whole of life</h2>
        <p>For most families, the right product is term assurance — cover for a fixed period (typically 25 or 30 years) that pays out if you die during that term. It's affordable, straightforward, and designed for the period when your financial obligations are highest.</p>
        <p>Whole of life policies are different — permanent and guaranteed to pay out eventually, which makes them significantly more expensive and better suited to estate planning than family protection.</p>

        <div className="art-tip"><strong>Joint vs single policies:</strong> Many couples take out a joint policy because it's cheaper. But a joint policy only pays out once — on the first death. Two separate policies cost slightly more but protect both of you fully. For families with young children, this matters.</div>

        <h2>The honest truth about cost</h2>
        <p>For a healthy non-smoker in their 30s, £500,000 of level term cover over 25 years can cost under £20 a month. The longer you wait, the more it costs — because premiums are based on age and health at the time of application.</p>
        <p>Every year you delay is a year of not being covered and a slightly higher starting premium when you eventually do it.</p>
      </article>
