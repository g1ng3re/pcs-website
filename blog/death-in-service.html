  return (
    <React.Fragment>
      <div className="art-hero">
        <div className="art-hero-i">
          <a href="../blog" style={{font:"700 12px var(--font-sans)",color:"rgba(255,255,255,.4)",textDecoration:"none",display:"inline-block",marginBottom:16}}>← Blog</a>
          <div><span className="art-cat">Protection</span></div>
          <h1 style={{font:"900 clamp(28px,4vw,44px)/1.1 var(--font-display)",color:"#fff",letterSpacing:"-.02em",margin:"14px 0 0"}}>Why your death in service from work probably isn't enough</h1>
          <div style={{font:"500 13px var(--font-sans)",color:"rgba(255,255,255,.4)",marginTop:14,display:"flex",gap:16}}>
            <span>5 min read</span><span>Protection</span>
          </div>
        </div>
      </div>

      <article className="art-body">
        <p>If you asked most people what life insurance they have, they'd say something like: "I'm covered through work." And they'd believe it. They'd feel reassured. They might even stop thinking about it entirely.</p>
        <p>The problem? Death in service is not life insurance. Not really. Here's what it actually is — and why the gap between what you have and what you need could be enormous.</p>

        <h2>What death in service actually is</h2>
        <p>Death in service is a benefit your employer pays your nominated dependants if you die while employed by the company. It's typically expressed as a multiple of your salary — usually 2x to 4x, though some employers offer up to 6x.</p>
        <p>So if you earn £45,000 and your employer offers 3x death in service, your family would receive £135,000 if you died in service. That sounds decent. But here's what most people don't realise.</p>

        <h2>What death in service isn't</h2>
        <div className="art-pull">It's not your policy. You don't own it. You can't transfer it. The day you leave that job, it disappears entirely.</div>
        <p>Death in service is a group scheme run by your employer under a master policy. You're covered as long as you're on the payroll. The moment you resign, get made redundant, or retire — the cover ends. There's no payout to carry forward, no conversion option in most cases, and no way to take it with you.</p>
        <p>So if you left your job at 50 with no personal life cover in place, you'd be starting from scratch — older, potentially with health conditions that push premiums up or make cover harder to get.</p>

        <h2>The three gaps nobody talks about</h2>
        <h3>Gap 1: The amount is usually too low</h3>
        <p>Think about what your family would actually need if you were gone. The mortgage. The childcare. The school fees. The years of income replacement. The debts. For most families with a mortgage and dependants, 3x salary doesn't come close to covering it all.</p>
        <h3>Gap 2: It doesn't cover serious illness</h3>
        <p>Death in service pays out when you die. Not if you have a stroke at 42, or get a cancer diagnosis, or can't work for two years because of a serious condition. For that, you'd need critical illness cover or income protection — which are separate products entirely.</p>
        <h3>Gap 3: It's not guaranteed</h3>
        <p>Your employer can change the benefit, remove it, or fold entirely. If the company enters administration, the group policy may no longer pay. This is rare but it happens — and you'll have no warning.</p>

        <div className="art-warn"><strong>⚠️ A common assumption:</strong> Many people think their death in service from work is "sorted." It rarely is. It's a starting point, not a solution.</div>

        <h2>What should you actually have?</h2>
        <p>The right answer depends on your circumstances — your mortgage balance, your income, your dependants, your debts, and whether you're a single-income or dual-income household. But as a rule of thumb, most advisers suggest you need enough to:</p>
        <ul>
          <li>Clear the mortgage</li>
          <li>Replace your income for 5–10 years</li>
          <li>Cover any outstanding debts</li>
          <li>Provide for your children's education and care</li>
        </ul>

        <div className="art-tip"><strong>Worth knowing:</strong> A personal term life policy for a healthy non-smoker in their 30s can cost less than a streaming subscription per month. Most people are surprised by how affordable it is when they actually look into it.</div>

        <h2>What to do about it</h2>
        <p>Don't cancel your death in service — it's a free benefit, take it. But don't rely on it as your plan. Instead, use it as part of a wider protection strategy that you actually own and control.</p>
        <p>A proper review will look at your death in service alongside your mortgage, your income, your partner's situation, and your wider financial picture — and fill the gaps with the right cover at the right cost.</p>
      </article>
