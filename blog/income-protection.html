  return (
    <React.Fragment>
      <div className="art-hero">
        <div className="art-hero-i">
          <a href="../blog" style={{font:"700 12px var(--font-sans)",color:"rgba(255,255,255,.4)",textDecoration:"none",display:"inline-block",marginBottom:16}}>← Blog</a>
          <div><span className="art-cat">Protection</span></div>
          <h1 style={{font:"900 clamp(28px,4vw,44px)/1.1 var(--font-display)",color:"#fff",letterSpacing:"-.02em",margin:"14px 0 0"}}>What is income protection and do I actually need it?</h1>
          <div style={{font:"500 13px var(--font-sans)",color:"rgba(255,255,255,.4)",marginTop:14,display:"flex",gap:16}}><span>6 min read</span><span>Protection</span></div>
        </div>
      </div>
      <article className="art-body">
        <p>Here's a question most people have never seriously thought about: if you couldn't work tomorrow — illness, injury, accident, anything — how long could you actually manage?</p>
        <p>Think about your monthly outgoings. The mortgage or rent. Bills, food, childcare. Now look at your savings. How many months does that cover before things start to fall apart?</p>
        <p>For most households, the honest answer is uncomfortable. And yet income protection — the insurance designed specifically for this scenario — is one of the least-discussed policies in the UK.</p>

        <h2>What income protection actually is</h2>
        <p>Income protection is a policy that pays you a regular income if you're unable to work due to illness or injury. It's not a lump sum like life insurance — it pays out monthly, replacing a portion of your earnings (typically 50–70% of your gross income) for as long as you're unable to work, up to a maximum age you choose when you take out the policy.</p>
        <p>It covers the things that life insurance doesn't — the long months or years of being unable to work, rather than the moment of death.</p>

        <div className="art-pull">The most common reason people make a claim on income protection isn't cancer or a serious accident. It's mental health conditions, back and joint problems, and stress-related illness.</div>

        <h2>How the numbers work</h2>
        <h3>The deferred period</h3>
        <p>This is the waiting period between when you stop working and when the policy starts paying. Most people choose 4 weeks, 8 weeks, 13 weeks, or 26 weeks. The longer the deferred period, the lower the premium — but the more you need to survive on savings in the meantime.</p>
        <p>If your employer pays full sick pay for three months, choosing a 13-week deferred period makes sense. If you're self-employed with no sick pay at all, you might want the shortest deferred period you can afford.</p>

        <h3>The benefit amount</h3>
        <p>You can insure up to about 70% of your gross income. The reason it's not 100% is to maintain an incentive to return to work. For most people, 60% of gross income is close to their net (take-home) pay — so the policy maintains their lifestyle without making them financially better off sick than working.</p>

        <h3>The payment period</h3>
        <p>Some policies pay out to a set age (e.g. until you'd reach retirement at 65 or 67). These "long-term" or "full-term" policies are the gold standard. Others only pay for 1, 2, or 5 years per claim — cheaper, but you'd need to recover or find another income within that window.</p>

        <div className="art-tip"><strong>Self-employed?</strong> This policy is arguably even more important for you. You have no employer sick pay, no company benefits, and no one else covering your income if you can't work. Income protection for the self-employed is usually priced very competitively — don't assume it's expensive before you check.</div>

        <h2>What about statutory sick pay?</h2>
        <p>Statutory Sick Pay (SSP) currently pays £116.75 per week for up to 28 weeks. That's roughly £505 a month. If your mortgage is £1,200 a month and you have a family to support, you can see the gap immediately. SSP is a safety net, not a solution.</p>

        <h2>Common reasons people don't get it</h2>
        <h3>"I'll be fine — I'm healthy"</h3>
        <p>Most long-term absence claims aren't from people who were unhealthy. They're from people who had no warning — a disc problem that flared up, a diagnosis that came out of nowhere, a mental health crisis. You don't know it's coming until it has.</p>
        <h3>"My employer will look after me"</h3>
        <p>Some employers do. Most provide Statutory Sick Pay only. Check your contract — specifically what your employer pays, and for how long. Most people are surprised by how little it is.</p>
        <h3>"I can't afford it"</h3>
        <p>A policy for a 30-year-old non-smoker protecting £2,500 a month with a 13-week deferred period often costs less than £30–40 per month. The cost of not having it — losing your home, draining savings, relying on family — is substantially higher.</p>

        <div className="art-warn"><strong>A gap people miss:</strong> Critical illness pays a lump sum if you're diagnosed with a specific condition. Income protection pays monthly for as long as you can't work — including conditions not on a critical illness list. They're different products, and ideally you'd have both.</div>

        <h2>Who needs it most?</h2>
        <ul>
          <li>Self-employed people with no employer sick pay</li>
          <li>Single-income households where one person's salary covers everything</li>
          <li>People with a mortgage and no savings buffer</li>
          <li>Anyone with dependants who rely on their income</li>
          <li>People in physically demanding roles with a higher injury risk</li>
        </ul>
        <p>That covers a lot of people. The question isn't really "do I need it" — it's "how would I cope without it."</p>
      </article>

        <h3>See what income protection would cost you</h3>

        <a href={CALENDLY} target="_blank" rel="noopener">Book a free consultation →</a>
      </div>

        <p>⚠️ This article is for information only and does not constitute financial advice. Speak to a qualified adviser before making any decisions about your protection cover. Property Clinic Solutions is authorised and regulated by the Financial Conduct Authority.</p>
      </div>
