function Article() {
  return (
    <React.Fragment>
      <div className="art-hero">
        <div className="art-hero-i">
          <a href="../blog" style={{font:"700 12px var(--font-sans)",color:"rgba(255,255,255,.4)",textDecoration:"none",display:"inline-block",marginBottom:16}}>← Blog</a>
          <div><span className="art-cat">Mortgages</span></div>
          <h1 style={{font:"900 clamp(28px,4vw,44px)/1.1 var(--font-display)",color:"#fff",letterSpacing:"-.02em",margin:"14px 0 0"}}>First-time buyer: what actually happens between offer and keys</h1>
          <div style={{font:"500 13px var(--font-sans)",color:"rgba(255,255,255,.4)",marginTop:14,display:"flex",gap:16}}><span>7 min read</span><span>Mortgages</span></div>
        </div>
      </div>
      <article className="art-body">
        <p>Everyone knows the headline steps: save a deposit, get a mortgage, buy a house. What nobody tells you is what actually happens between those steps: the weeks of waiting, the unfamiliar terms, the people involved, and the reasons it all takes longer than you expected.</p>
        <p>This is the guide nobody gave you.</p>

        <h2>Before you look at a single house</h2>
        <p>The biggest mistake first-time buyers make is falling in love with a property before they know what they can actually borrow. Estate agents will take you more seriously, and sellers will accept your offers more readily, if you've already got a mortgage agreement in principle.</p>

        <div className="step"><div className="step-num">1</div><div><h3>Get an Agreement in Principle (AIP)</h3><p>Also called a Decision in Principle or Mortgage in Principle. It's a conditional statement from a lender saying they'd consider lending you up to a certain amount, based on a soft credit check. It's not binding, but it shows you're a serious buyer. Get this before you start viewing.</p></div></div>
        <div className="step"><div className="step-num">2</div><div><h3>Instruct a solicitor (conveyancer) early</h3><p>You'll need a conveyancer before you can proceed once an offer is accepted. Research and instruct one before you find a house so you're not scrambling. Costs typically range from £1,000–£2,000 depending on the property price.</p></div></div>

        <h2>Making an offer</h2>
        <p>Once you find a property, you make an offer through the estate agent. This is verbal and not legally binding. Either party can walk away at any point until contracts are exchanged. Nothing is guaranteed until exchange.</p>

        <h2>After the offer is accepted: the long bit</h2>
        <div className="art-pull">The average time between offer accepted and completion in England is 12–16 weeks. First-time buyers often expect it to be 4–6. It's not.</div>

        <div className="step"><div className="step-num">3</div><div><h3>Full mortgage application</h3><p>Your AIP becomes a full application. The lender verifies your income, runs a hard credit check, and instructs a valuation of the property. This typically takes 2–4 weeks. Respond to any requests quickly, as delays here cascade.</p></div></div>
        <div className="step"><div className="step-num">4</div><div><h3>Conveyancing searches</h3><p>Your solicitor conducts legal searches on the property: local authority (planning, highways), drainage, environmental, and others. These can take 2–6 weeks depending on the local authority. Leasehold properties take longer than freehold.</p></div></div>
        <div className="step"><div className="step-num">5</div><div><h3>Survey</h3><p>The lender does a basic valuation (to protect themselves). You should also commission your own survey (a HomeBuyer Report or full structural survey) to protect yourself. Surveys can reveal issues that affect your decision to proceed or what price you pay.</p></div></div>
        <div className="step"><div className="step-num">6</div><div><h3>Exchange of contracts</h3><p>The point of no return. Both parties sign identical contracts, you pay the deposit (usually 10% of the purchase price), and a completion date is set. If either party pulls out after exchange, there are financial penalties. Buildings insurance must be in place from exchange.</p></div></div>
        <div className="step"><div className="step-num">7</div><div><h3>Completion</h3><p>The remaining money transfers from your solicitor to the seller's solicitor. The seller vacates, the estate agent releases the keys to you. You're a homeowner. This typically happens 1–4 weeks after exchange.</p></div></div>

        <h2>Three things that go wrong</h2>
        <h3>Slow searches</h3>
        <p>Local authority searches can take weeks. Chase your solicitor regularly. A good one will be on top of it, but some aren't. If it's taking too long, ask about indemnity insurance as an alternative.</p>
        <h3>Gazumping</h3>
        <p>The seller accepts a higher offer from someone else before exchange. It's legal and it happens. The only real protection is moving quickly and building a good relationship with the agent.</p>
        <h3>The chain collapses</h3>
        <p>If you're buying from someone who's buying from someone else, you're in a chain. Any link breaking can affect your purchase. Your solicitor and agent should be keeping tabs on the whole chain.</p>

        <div className="art-tip"><strong>Protection from day one:</strong> Once you have a mortgage offer, set up your life insurance and critical illness cover to start from completion. If something happens between exchange and completion, when you're legally committed, you want to be covered from day one.</div>
      </article>

        <h3>Buying your first home? Let's talk</h3>

      </div>

      </div>
    </React.Fragment>
  );
}
