<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PCS — Protection Meeting Guide</title>
<link rel="manifest" href="/guide/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Meeting Guide" />
<meta name="theme-color" content="#0C1A3A" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#002AB1;--blue-h:#00239A;--blue-t:#E7ECFA;
  --ink:#0C1A3A;--emerald:#109E6C;--emerald-t:#E3F4EC;--emerald-h:#0E8C60;
  --gold:#DB9F1F;--gold-t:#FBF2DB;
  --paper:#F7F7F4;--card:#FFFFFF;--sunken:#EEF0F4;
  --n200:#E6E7EC;--n300:#D3D7E0;--n400:#AEB4C2;--n500:#7E8699;--n600:#5A6173;--n700:#3D4254;
  --font:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font);background:var(--paper);color:var(--ink);min-height:100vh;
  padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));}

/* ── GATE ─────────────────────────────────────────────────────── */
#gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;
  justify-content:center;z-index:999;padding:24px;}
#gate.hidden{display:none;}
.gate-box{width:100%;max-width:300px;text-align:center;}
.gate-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:8px;font-weight:700;}
.gate-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:28px;letter-spacing:-.02em;}
.gate-input{width:100%;padding:13px 16px;border-radius:10px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);color:#fff;font-family:var(--font);font-size:16px;
  outline:none;text-align:center;letter-spacing:.08em;margin-bottom:10px;}
.gate-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:0;}
.gate-input:focus{border-color:rgba(255,255,255,.4);}
.gate-btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:var(--blue);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;transition:.15s;}
.gate-btn:hover{background:var(--blue-h);}
.gate-err{font-size:12.5px;color:#f08080;margin-top:9px;height:18px;}

/* ── APP ──────────────────────────────────────────────────────── */
#app{display:none;}#app.visible{display:block;}

/* ── HEADER ───────────────────────────────────────────────────── */
.header{background:var(--ink);padding:0 16px;position:sticky;top:0;z-index:10;
  padding-top:env(safe-area-inset-top,0px);}
.header-inner{max-width:700px;margin:0 auto;}
.header-top{display:flex;align-items:center;gap:12px;padding:14px 0 10px;}
.rank-badge{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.rank-icon{font-size:20px;line-height:1;}
.rank-info{min-width:0;}
.rank-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.xp-label{font-size:10.5px;color:var(--gold);font-weight:600;letter-spacing:.04em;}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.xp-total{font-size:13px;font-weight:800;color:var(--gold);letter-spacing:.02em;}
.reset-btn{font-size:11.5px;padding:5px 10px;border-radius:7px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);cursor:pointer;
  font-family:var(--font);font-weight:600;transition:.15s;}
.reset-btn:hover{background:rgba(255,255,255,.13);}
.xp-bar-wrap{margin-bottom:10px;}
.xp-bar-track{height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--emerald));
  border-radius:3px;transition:.4s cubic-bezier(.34,1.56,.64,1);}
.xp-bar-label{display:flex;justify-content:space-between;margin-top:4px;}
.xp-bar-left,.xp-bar-right{font-size:10px;color:rgba(255,255,255,.3);font-weight:600;}
.tabs{display:flex;gap:2px;}
.tab-btn{flex:1;padding:9px 8px;border:none;cursor:pointer;font-family:var(--font);
  font-size:12px;font-weight:700;background:transparent;color:rgba(255,255,255,.4);
  border-radius:8px 8px 0 0;transition:.15s;}
.tab-btn.active{background:var(--paper);color:var(--ink);}
.tab-count{margin-left:4px;font-size:10.5px;opacity:.6;}
.tab-btn.active .tab-count{color:var(--blue);opacity:1;}

/* ── PAGE ─────────────────────────────────────────────────────── */
.content{max-width:700px;margin:0 auto;padding:16px;}

/* ── SECTION CARD ─────────────────────────────────────────────── */
.sc{background:var(--card);border:1.5px solid var(--n200);border-radius:16px;
  overflow:hidden;margin-bottom:10px;transition:border-color .2s,box-shadow .2s,background .2s;}
.sc.done{background:var(--emerald-t);border-color:rgba(16,158,108,.3);
  box-shadow:0 2px 14px rgba(16,158,108,.12);}

/* Section header */
.sc-head{width:100%;background:none;border:none;cursor:pointer;
  padding:16px 18px 13px;text-align:left;display:flex;flex-direction:column;gap:10px;}
.sc-head-row{display:flex;align-items:center;gap:10px;}
.sc-icon{font-size:20px;min-width:26px;}
.sc-title{font-size:15.5px;font-weight:700;color:var(--ink);flex:1;letter-spacing:-.015em;}
.done .sc-title{color:var(--emerald-h);}
.badge-c{font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  padding:2px 7px;border-radius:999px;background:var(--gold-t);color:var(--gold);
  border:1px solid rgba(219,159,31,.25);white-space:nowrap;}
.sc-count{font-size:12px;font-weight:700;color:var(--n500);white-space:nowrap;}
.done .sc-count{color:var(--emerald);}
.sc-chev{font-size:9px;color:var(--n400);margin-left:2px;transition:transform .2s;}
.sc-chev.open{transform:rotate(180deg);}

/* Section progress bar */
.sc-prog{height:3px;background:var(--n200);border-radius:2px;overflow:hidden;}
.sc-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--emerald));
  border-radius:2px;transition:width .4s cubic-bezier(.34,1.56,.64,1);}

/* Section body */
.sc-body{display:none;}
.sc-body.open{display:block;}

/* Compliance & info notes */
.cn{display:flex;align-items:flex-start;gap:8px;padding:11px 18px;
  background:var(--gold-t);border-top:1px solid rgba(219,159,31,.2);
  border-bottom:1px solid rgba(219,159,31,.2);font-size:12.5px;color:#7a5a0a;
  font-weight:600;line-height:1.55;}
.in{padding:11px 18px;background:var(--sunken);border-bottom:1px solid var(--n200);
  font-size:12.5px;color:var(--n600);line-height:1.6;font-style:italic;}

/* ── SCRIPTS ZONE ─────────────────────────────────────────────── */
.scripts-zone{padding:16px 18px 14px;background:var(--sunken);border-bottom:1.5px solid var(--n200);}
.zone-eyebrow{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--n400);margin-bottom:12px;}

/* Script card */
.script-card{background:var(--card);border-radius:12px;border:1px solid var(--n200);
  border-left:3px solid var(--blue);padding:13px 15px;margin-bottom:8px;}
.script-card:last-child{margin-bottom:0;}
.script-card.is-note{border-left-color:var(--gold);}
.sc-lbl{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--blue);margin-bottom:7px;}
.is-note .sc-lbl{color:var(--gold);}
.sc-txt{font-size:14px;line-height:1.8;color:var(--n700);}
.sc-txt.quote{font-style:italic;}

/* ── CHECKLIST ZONE ───────────────────────────────────────────── */
.items-zone{padding:14px 18px 16px;}
.items-zone .zone-eyebrow{margin-bottom:8px;}

/* Item row */
.item-row{display:flex;align-items:flex-start;gap:12px;padding:10px 10px;
  border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:3px;}
.item-row:active{background:var(--sunken);}
.item-row.checked{background:rgba(16,158,108,.07);}
.item-row.indent{padding-left:36px;}

/* Custom toggle */
.tog{width:22px;height:22px;border-radius:50%;border:2px solid var(--n300);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  background:var(--card);transition:all .15s;}
.item-row.checked .tog{background:var(--emerald);border-color:var(--emerald);}
.tog svg{opacity:0;transition:opacity .15s;}
.item-row.checked .tog svg{opacity:1;}

/* Item text */
.item-lbl{flex:1;font-size:13.5px;line-height:1.55;color:var(--ink);}
.item-row.checked .item-lbl{text-decoration:line-through;opacity:.38;}
.item-lbl.bold{font-weight:700;}
.sub-arrow{color:var(--n400);margin-right:3px;font-size:11px;}
.item-pts{font-size:10px;font-weight:700;color:var(--n400);margin-top:4px;flex-shrink:0;}
.item-row.checked .item-pts{color:var(--emerald);}

/* ── POST TAB ─────────────────────────────────────────────────── */
.post-list{display:flex;flex-direction:column;gap:5px;}
.post-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  border-radius:12px;cursor:pointer;background:var(--card);border:1.5px solid var(--n200);
  transition:.12s;}
.post-row:active{background:var(--sunken);}
.post-row.checked{background:rgba(16,158,108,.06);border-color:rgba(16,158,108,.2);}
.post-row.checked .item-lbl{text-decoration:line-through;opacity:.38;}
.c-pip{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:1px 6px;border-radius:999px;background:var(--gold-t);color:var(--gold);
  border:1px solid rgba(219,159,31,.25);margin-right:6px;flex-shrink:0;}

/* ── XP POP ───────────────────────────────────────────────────── */
.xp-pop{position:fixed;pointer-events:none;font-size:13px;font-weight:800;
  color:var(--gold);z-index:999;}
@keyframes xp-rise{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-28px) scale(1.1);}
  100%{opacity:0;transform:translateY(-54px) scale(.9);}
}

/* ── TOAST ────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;
  transform:translateX(-50%) translateY(80px);z-index:100;
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;
  font-size:13.5px;font-weight:700;white-space:nowrap;pointer-events:none;
  box-shadow:0 6px 24px rgba(12,26,58,.35);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── RANK UP ──────────────────────────────────────────────────── */
#rank-up{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;}
#rank-up.show{opacity:1;}
.ru-box{background:var(--ink);border:2px solid var(--gold);border-radius:20px;
  padding:28px 36px;text-align:center;transform:scale(.8);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
#rank-up.show .ru-box{transform:scale(1);}
.ru-icon{font-size:48px;margin-bottom:8px;}
.ru-eyebrow{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold);margin-bottom:4px;}
.ru-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.01em;}

/* ── CONFETTI ─────────────────────────────────────────────────── */
.confetti-bit{position:fixed;top:-10px;pointer-events:none;z-index:200;border-radius:2px;opacity:0;}
@keyframes confetti-fall{
  0%{opacity:1;transform:translateY(0) rotate(0deg);}
  100%{opacity:0;transform:translateY(105vh) rotate(720deg);}
}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-eyebrow">Property Clinic Solutions</div>
    <div class="gate-title">Meeting Guide</div>
    <input id="gate-pw" type="password" class="gate-input" placeholder="Password" autocomplete="current-password" />
    <button class="gate-btn" onclick="checkPassword()">Unlock</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- RANK UP -->
<div id="rank-up">
  <div class="ru-box">
    <div class="ru-icon" id="ru-icon"></div>
    <div class="ru-eyebrow">Rank Up!</div>
    <div class="ru-title" id="ru-title"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="rank-badge">
          <div class="rank-icon" id="hd-icon"></div>
          <div class="rank-info">
            <div class="rank-name" id="hd-rank"></div>
            <div class="xp-label" id="hd-xp-label"></div>
          </div>
        </div>
        <div class="header-actions">
          <div class="xp-total" id="hd-xp"></div>
          <button class="reset-btn" onclick="resetCurrent()">Reset</button>
        </div>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-track"><div class="xp-bar-fill" id="xp-bar-fill" style="width:0%"></div></div>
        <div class="xp-bar-label">
          <span class="xp-bar-left" id="xp-bar-left"></span>
          <span class="xp-bar-right" id="xp-bar-right"></span>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="setTab('m1')" id="tab-m1">Meeting 1 <span class="tab-count" id="count-m1"></span></button>
        <button class="tab-btn" onclick="setTab('m2')" id="tab-m2">Meeting 2 <span class="tab-count" id="count-m2"></span></button>
        <button class="tab-btn" onclick="setTab('post')" id="tab-post">Post <span class="tab-count" id="count-post"></span></button>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── PASSWORD ─────────────────────────────────────────────────────────────────
const PASSWORD = 'pcs-protect';
function checkPassword(){
  if(document.getElementById('gate-pw').value===PASSWORD){
    sessionStorage.setItem('pcs_auth','1');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    render(); updateXP();
  } else {
    document.getElementById('gate-err').textContent='Incorrect password.';
    document.getElementById('gate-pw').value='';
  }
}
document.getElementById('gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
if(sessionStorage.getItem('pcs_auth')==='1'){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}

// ─── RANKS ───────────────────────────────────────────────────────────────────
const RANKS=[
  {name:'Getting Started',    icon:'🌱',min:0},
  {name:'Building Confidence',icon:'📋',min:50},
  {name:'Protection Adviser', icon:'🛡️',min:150},
  {name:'Compliance Pro',     icon:'⚖️',min:300},
  {name:'Client Champion',    icon:'🏆',min:500},
  {name:'Meeting Legend',     icon:'🌟',min:750},
];
function getRank(xp){let r=RANKS[0];for(const x of RANKS){if(xp>=x.min)r=x;}return r;}
function getNextRank(xp){return RANKS.find(r=>r.min>xp)||null;}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab='m1', checked={}, lastRank=null;
try{checked=JSON.parse(localStorage.getItem('pcs_checks')||'{}');}catch(e){}
function save(){try{localStorage.setItem('pcs_checks',JSON.stringify(checked));}catch(e){}}
function resetCurrent(){
  const data=currentTab==='m1'?M1:currentTab==='m2'?M2:POST_ITEMS;
  getAllIds(data).forEach(id=>delete checked[id]);
  save();render();updateXP();
}

// ─── XP ──────────────────────────────────────────────────────────────────────
function calcTotalXP(){
  let xp=0;
  for(const s of M1)for(const i of s.items){if(checked[i.id])xp+=s.compliance?10:5;}
  for(const s of M2)for(const i of s.items){if(checked[i.id])xp+=s.compliance?10:5;}
  for(const i of POST_ITEMS){if(checked[i.id])xp+=i.compliance?10:5;}
  return xp;
}
function updateXP(){
  const xp=calcTotalXP();
  const rank=getRank(xp);
  const next=getNextRank(xp);
  document.getElementById('hd-icon').textContent=rank.icon;
  document.getElementById('hd-rank').textContent=rank.name;
  const pct=next?Math.round(((xp-rank.min)/(next.min-rank.min))*100):100;
  document.getElementById('xp-bar-fill').style.width=pct+'%';
  document.getElementById('hd-xp').textContent=xp+' XP';
  document.getElementById('hd-xp-label').textContent=next?(next.min-xp)+' XP to '+next.name:'🏆 Max rank!';
  document.getElementById('xp-bar-left').textContent=rank.name;
  document.getElementById('xp-bar-right').textContent=next?next.name:'';
  if(lastRank&&lastRank.name!==rank.name)showRankUp(rank);
  lastRank=rank;
}

// ─── ANIMATIONS ──────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
let rankUpTimer;
function showRankUp(rank){
  document.getElementById('ru-icon').textContent=rank.icon;
  document.getElementById('ru-title').textContent=rank.name;
  const el=document.getElementById('rank-up');
  el.classList.add('show');
  clearTimeout(rankUpTimer);
  rankUpTimer=setTimeout(()=>el.classList.remove('show'),2400);
  confetti(12);
}
function xpPop(el,xp){
  const rect=el.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='xp-pop';
  pop.textContent='+'+xp+' XP';
  pop.style.cssText=`left:${rect.right+6}px;top:${rect.top+4}px;`;
  document.body.appendChild(pop);
  pop.style.animation='xp-rise .75s ease-out forwards';
  setTimeout(()=>pop.remove(),800);
}
const CONF_COLORS=['#002AB1','#109E6C','#DB9F1F','#E7ECFA','#E3F4EC','#fff'];
function confetti(n=18){
  for(let i=0;i<n;i++){
    const b=document.createElement('div');
    b.className='confetti-bit';
    const w=6+Math.random()*8,h=6+Math.random()*8;
    b.style.cssText=`left:${10+Math.random()*80}vw;width:${w}px;height:${h}px;
      background:${CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)]};
      animation:confetti-fall ${1.2+Math.random()*1.2}s ${Math.random()*.4}s ease-in forwards;`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),3000);
  }
}
const SECTION_MSGS=['✅ Section done!','🔥 On a roll!','⚡ Keep going!','💪 Boss move!',
  '🚀 Smashing it!','🏆 Section cleared!','✨ Flawless!'];
let sectionMsgIdx=0;

// ─── DATA ────────────────────────────────────────────────────────────────────
const M1=[
  {id:"pre",title:"Before the Meeting",icon:"📋",
    items:[
      {id:"pre1",text:"Book appointment via Microsoft Teams — use client email for the invite"},
      {id:"pre2",text:"Email the IDD at the same time as the Teams invite"},
      {id:"pre3",text:"Confirm meeting time and Teams link in the email"},
    ]},
  {id:"transcript",title:"Transcript Consent",icon:"🎙",compliance:true,
    complianceNote:"Record verbal consent in file before proceeding.",
    scripts:[
      {label:"Say this",text:'"Before we get into anything — I am going to turn on the meeting transcript now. It means I can focus on you properly rather than taking notes. Are you happy with that?"'},
    ],
    items:[
      {id:"tr1",text:"Turn on transcript before the meeting begins"},
      {id:"tr2",text:"Inform client and get verbal permission"},
      {id:"tr3",text:"Note consent in file"},
    ]},
  {id:"welcome",title:"Welcome",icon:"👋",
    note:"Do not rush this. A comfortable client is an honest client. The quality of your fact-find depends on it.",
    scripts:[
      {label:"Openers",text:'"How are you doing? How has the week been?"\n"How long have you been in the house now?"\n"How is the family? Kids keeping you busy?"'},
      {label:"Accessibility check",text:'"Is there anything I need to consider in how the meeting runs today? Anything that would help you get the most out of it?"'},
    ],
    items:[
      {id:"w1",text:"Take genuine time — do not rush straight into the agenda"},
      {id:"w2",text:"Make them feel comfortable and at ease"},
      {id:"w3",text:"Ask if there is anything to consider in how the meeting runs"},
    ]},
  {id:"idd",title:"IDD Check",icon:"📄",compliance:true,
    complianceNote:"IDD confirmed read or covered in full. Record in file.",
    scripts:[
      {label:"Opening",text:'"Before we started I sent over a document called the Initial Disclosure Document. Did you get a chance to read through that?"'},
      {label:"If YES",text:'"Great. Any questions on anything in there, or are you happy with everything?"'},
      {label:"If NO — GDPR",text:'"No problem. In terms of your data — we take GDPR seriously. The information you share with me today will not be passed on to anyone except the insurer at the point we make an application. That is it."'},
      {label:"If NO — Fees",text:'"In terms of fees — we do not charge you anything for our advice. We are paid through commission from the insurance company when a policy is placed. So this conversation, the research, all of it costs you nothing directly."'},
      {label:"If NO — Provider",text:'"And in terms of who we work with — Property Clinic Solutions is independent. We are not tied to any single insurer. We search the whole market to find the best fit for your specific situation."'},
      {label:"Confirm",text:'"Are you happy with all of that before we move forward?"'},
    ],
    items:[
      {id:"idd1",text:"Ask if client has read the IDD"},
      {id:"idd2",text:"IF READ — any questions? Confirm happy",sub:true},

  {id:"abcdef",title:"ABCDEF — Picture Painting",icon:"🎨",
    note:"Lead with consequences, never products. Use their numbers throughout. Do not name a product until the priority question in F. Let the client do the maths out loud.",
    scripts:[
      {label:"A — Anchor income",text:'"When you applied for your mortgage, what was the one thing the lender cared most about? Your income is the engine. The [£X] you bring home every month is what pays the mortgage, covers the kids, runs the car — all of it. So everything I want to walk through today comes down to one question: what happens to all of that if the engine stops?"'},
      {label:"B — Open",text:'"Let me start with something completely ordinary. Nothing dramatic. Say you wake up tomorrow and your back has gone. You cannot sit, cannot drive, cannot work. The doctor signs you off for three months."'},
      {label:"B — The gap",text:'"Your full sick pay runs for [X weeks]. After that you drop to Statutory Sick Pay — around £118 a week, about £510 a month. But your essential outgoings are still [£X] every month. So from week [X] there is a gap of around [£X] a month going out with almost nothing coming in."'},
      {label:"B — Let them do the maths",text:'"How long do you think your savings would realistically cover that gap?"'},
      {label:"C — Transition",text:'"That was the ordinary version. Now let me change one thing. Same person, same situation — off work — but this time it is something serious. A diagnosis. Treatment. Months, not weeks."'},
      {label:"C — The difference",text:'"The income gap is still there but runs far longer. On top come the costs nobody plans for: appointments, a partner cutting hours, wanting to clear financial pressure so you can focus on getting well rather than staring at bills. This is not about replacing your wage month by month. It is about a single sum that takes the financial worry completely off the table."'},
      {label:"D — Transition",text:'"Those last two, you are still here. Now the hardest one. I will be straight with you because that is more useful. What happens if you are not here."'},
      {label:"D — The numbers",text:'"If something happened to you tomorrow, that [£X] mortgage does not go anywhere. [Partner] is left on [£X] a month with [dependants]. Right now, is there enough there to clear the house and give them room to breathe?"'},
      {label:"D — No dependants",text:'"You do not have dependants relying on your income, so this is less urgent than it would be for someone with a family. I want to be honest about that — it changes the priority order."'},
      {label:"E — Features",text:'"Whatever we look at, there are features that make cover actually work when it is needed — locking the premium in so it can never go up, making sure the cover pays for itself if you are too ill to work. I will factor those into the research."'},
      {label:"F — Summary",text:'"Let me pull the whole thing together on your numbers. If you are off for a few months with something ordinary, there is a gap of [£X] a month and savings that last [X months]. If something serious happens, that gap runs far longer with extra costs piling on. And if the worst happens, there is a [£X] mortgage and a family who still need that home. Right now all of that sits on your shoulders alone. Is that a fair picture?"'},
      {label:"F — Priority question",text:'"Put those three risks in order for me. Income risk, serious illness risk, death risk. Most important to least — and tell me why."'},
      {label:"F — Pushback if death first",text:'"I hear you, and the instinct to protect the family is exactly right. But can I push back? You are [age], non-smoker, in good health. The statistical likelihood of you dying before the end of that mortgage is relatively low. The far more likely scenario is that at some point you cannot work. Your sick pay runs out in [X weeks] and your savings last [X months]. If you are off for 6 months, your family is in the same position as if you died — the mortgage does not get paid either way. The outcome is identical. The route is just different, and statistically far more probable."'},
      {label:"F — Confirm revised order",text:'"So does that change the order for you? I want the recommendation I bring back to reflect the actual risk, not just what feels most dramatic."'},
    ],
    items:[
      {id:"a1",text:"A — Anchor income. Use the mortgage application as the hook.",bold:true},
      {id:"b1",text:"B — Paint the ordinary illness or injury scenario",bold:true},
      {id:"b2",text:"Use their actual sick pay and outgoings to show the monthly gap"},
      {id:"b3",text:"Ask: how long do savings cover that gap?"},
      {id:"b4",text:"Let them do the maths out loud — do not answer for them"},
      {id:"c1",text:"C — Upgrade to serious diagnosis",bold:true},
      {id:"c2",text:"Income gap longer, plus extra costs pile on"},
      {id:"c3",text:"Frame C as a lump sum need, not income replacement"},
      {id:"d1",text:"D — Death. Be direct, not dramatic",bold:true},
      {id:"d2",text:"Use their mortgage balance and household income to show the gap"},
      {id:"d3",text:"No dependants — be honest this is lower priority"},
      {id:"e1",text:"E — Guaranteed premiums and waiver of premium"},
      {id:"f1",text:"F — Summarise all three risks on their actual numbers",bold:true},
      {id:"f2",text:"Ask: put those three risks in order — and tell me why",bold:true},
      {id:"f3",text:"Push back if the data supports a different order"},
      {id:"f4",text:"If death first and low sick pay — challenge with the statistics"},
      {id:"f5",text:"Agree the revised priority together"},
      {id:"f6",text:"Record both the initial and revised priority in file",bold:true},
    ]},
  {id:"budget",title:"Budget",icon:"💷",compliance:true,
    complianceNote:"Confirmed budget must be recorded in file.",
    note:"Work from household disposable income. Include partner income. Never suggest a number — let them name it.",
    scripts:[
      {label:"The rule",text:"Never say a number first. The moment you say 'most clients pay around £X' you have set their ceiling. Use comfortable, not budget — budget signals a cap, comfortable signals a decision. Ask the question, then stop talking. The first person to speak loses."},
      {label:"The question",text:'"Based on everything you have told me — if we put something in place that covers your most important risk properly — what monthly figure would feel comfortable?"\n\n[Ask it. Then stop. Say nothing.]'},
      {label:'If they say "I don\'t know"',text:'"That is fine. Let me ask it differently. If cost were no factor at all — you could have whatever protection you wanted — what would that look like?\n\n[Let them describe the ideal. Then:]\n\n"Right. So that is what we are building towards. You have around [£X] disposable a month. Cover that properly closes your biggest risk typically sits in the [£A–£B] range on a household like yours. Where inside that feels workable to you?"'},
      {label:"If they give a low number — the ladder",text:'"Okay. Before you land on that — the difference between [£X] and [£Y] a month is [describe the cover difference]. For that extra [amount] we go from partially covered to properly covered. Worth knowing before you decide."'},
      {label:"If the number is low for their income",text:'"You have got around [£X] disposable between you. Is [£40] really the ceiling — or is there more room if we are protecting the most important things?"'},
      {label:"If self-employed",text:'"Is [£X] comfortable on a quieter month? I want whatever we put in place to actually stay in place when work gets quiet."'},
      {label:"If they will not commit",text:'"No problem. I will bring two options back — one conservative, one full cover. You will see the real numbers and decide from there. No guessing required."'},
    ],
    items:[
      {id:"bu1",text:"Household disposable income: net income minus essential outgoings"},
      {id:"bu2",text:"Include partner income in the total",bold:true},
      {id:"bu3",text:"Ask the question — then stay silent",bold:true},
      {id:"bu4",text:"'I don't know' → priorities first, then anchor to their disposable income"},
      {id:"bu5",text:"Low number → use the ladder — show what a small stretch gets them"},
      {id:"bu6",text:"Self-employed → base it on a slower month"},
      {id:"bu7",text:"Won't commit → two options, let the real numbers decide"},
      {id:"bu8",text:"Record the confirmed figure in file"},
    ]},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAllIds(data){
  if(!data[0]?.items)return data.map(i=>i.id);
  return data.flatMap(s=>s.items.map(i=>i.id));
}
function countChecked(data){
  const ids=getAllIds(data);
  return{done:ids.filter(id=>checked[id]).length,total:ids.length};
}
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  updateCounts();render();
}
function updateCounts(){
  ['m1','m2','post'].forEach(t=>{
    const data=t==='m1'?M1:t==='m2'?M2:POST_ITEMS;
    const{done,total}=countChecked(data);
    document.getElementById('count-'+t).textContent=done+'/'+total;
  });
  updateXP();
}
function toggleCheck(id,el){
  const wasChecked=!!checked[id];
  checked[id]=!wasChecked;
  save();
  const row=document.querySelector('[data-id="'+id+'"]');
  if(row)row.classList.toggle('checked',!!checked[id]);
  if(!wasChecked&&el){
    const data=currentTab==='m1'?M1:currentTab==='m2'?M2:null;
    let isC=false;
    if(data){for(const s of data){if(s.compliance&&s.items.find(i=>i.id===id)){isC=true;break;}}}
    else{const pi=POST_ITEMS.find(i=>i.id===id);if(pi?.compliance)isC=true;}
    xpPop(el,isC?10:5);
  }
  const card=row?.closest('.sc');
  if(card){
    const wasAllDone=card.classList.contains('done');
    updateSectionDone(card);
    if(!wasAllDone&&card.classList.contains('done')){
      showToast(SECTION_MSGS[sectionMsgIdx%SECTION_MSGS.length]);
      sectionMsgIdx++;confetti(10);
    }
  }
  updateCounts();
  checkTabComplete();
}
function checkTabComplete(){
  const data=currentTab==='m1'?M1:currentTab==='m2'?M2:POST_ITEMS;
  const{done,total}=countChecked(data);
  if(done===total&&total>0){
    const labels={m1:'Meeting 1 done! 🎉',m2:'Meeting 2 done! 🎊',post:'All admin done! 🏆'};
    setTimeout(()=>{showToast(labels[currentTab]);confetti(25);},300);
  }
}
function updateSectionDone(card){
  const rows=card.querySelectorAll('.item-row[data-id]');
  const total=rows.length;
  const done=[...rows].filter(r=>r.classList.contains('checked')).length;
  const pct=total?Math.round((done/total)*100):0;
  card.classList.toggle('done',done===total&&total>0);
  const fill=card.querySelector('.sc-prog-fill');
  if(fill)fill.style.width=pct+'%';
  const ct=card.querySelector('.sc-count');
  if(ct)ct.textContent=done+'/'+total;
}
function toggleSection(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const TOG_SVG=`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderSection(section){
  const ids=section.items.map(i=>i.id);
  const done=ids.filter(id=>checked[id]).length;
  const total=ids.length;
  const pct=total?Math.round((done/total)*100):0;
  const allDone=done===total&&total>0;
  const scripts=section.scripts||[];

  const scriptsHTML=scripts.length?`
    <div class="scripts-zone">
      <div class="zone-eyebrow">Scripts</div>
      ${scripts.map(s=>{
        const isNote=!s.text.trim().startsWith('"');
        const isQuote=s.text.trim().startsWith('"');
        return`<div class="script-card${isNote?' is-note':''}">
          <div class="sc-lbl">${esc(s.label)}</div>
          <div class="sc-txt${isQuote?' quote':''}">${esc(s.text)}</div>
        </div>`;
      }).join('')}
    </div>`:'';

  const itemsHTML=`
    <div class="items-zone">
      <div class="zone-eyebrow">Checklist</div>
      ${section.items.map(item=>`
        <div class="item-row${checked[item.id]?' checked':''}${item.indent?' indent':''}"
             data-id="${item.id}" onclick="toggleCheck('${item.id}',this)">
          <div class="tog">${TOG_SVG}</div>
          <span class="item-lbl${item.bold?' bold':''}">${item.sub?'<span class="sub-arrow">↳</span>':''}${esc(item.text)}</span>
          <span class="item-pts">${section.compliance?10:5}</span>
        </div>`).join('')}
    </div>`;

  return`<div class="sc${allDone?' done':''}" id="card-${section.id}">
    <button class="sc-head" onclick="toggleSection('${section.id}')">
      <div class="sc-head-row">
        <span class="sc-icon">${section.icon}</span>
        <span class="sc-title">${esc(section.title)}</span>
        ${section.compliance?'<span class="badge-c">Compliance</span>':''}
        <span class="sc-count">${done}/${total}</span>
        <span class="sc-chev" id="chev-${section.id}">▼</span>
      </div>
      <div class="sc-prog"><div class="sc-prog-fill" style="width:${pct}%"></div></div>
    </button>
    <div class="sc-body" id="body-${section.id}">
      ${section.compliance&&section.complianceNote?`<div class="cn"><span>⚠️</span><span>${esc(section.complianceNote)}</span></div>`:''}
      ${section.note?`<div class="in">${esc(section.note)}</div>`:''}
      ${scriptsHTML}${itemsHTML}
    </div>
  </div>`;
}

function render(){
  const container=document.getElementById('content');
  if(!container)return;
  const data=currentTab==='m1'?M1:currentTab==='m2'?M2:null;
  if(data){
    container.innerHTML=data.map(renderSection).join('');
  } else {
    container.innerHTML=`<div class="post-list">
      ${POST_ITEMS.map(item=>`
        <div class="post-row${checked[item.id]?' checked':''}" data-id="${item.id}" onclick="toggleCheck('${item.id}',this)">
          <div class="tog">${TOG_SVG}</div>
          <span class="item-lbl">${item.compliance?'<span class="c-pip">C</span>':''}${esc(item.text)}</span>
          <span class="item-pts">${item.compliance?10:5}</span>
        </div>`).join('')}
    </div>`;
  }
  updateCounts();
}
