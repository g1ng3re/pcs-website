<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#f3efe6;--paper2:#ebe5d8;--card:#faf8f3;
  --ink:#1c1b18;--ink-soft:#5c594f;--ink-faint:#9c9688;
  --teal:#1f5d52;--teal-light:#e8f0ee;--teal-deep:#15433b;
  --amber:#a06b1a;--amber-light:#fdf3e3;
  --line:rgba(28,27,24,0.1);--line2:rgba(28,27,24,0.06);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom, 40px);}

/* ── PASSWORD GATE ─────────────────────────────────────────────── */
#gate{
  position:fixed;inset:0;background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:24px;
}
#gate.hidden{display:none;}
.gate-box{width:100%;max-width:320px;text-align:center;}
.gate-logo{font-family:'Fraunces',serif;font-weight:500;font-size:13px;letter-spacing:.08em;color:rgba(243,239,230,0.4);margin-bottom:6px;text-transform:uppercase;}
.gate-title{font-family:'Fraunces',serif;font-weight:500;font-size:24px;color:#f3efe6;margin-bottom:28px;}
.gate-input{
  width:100%;padding:13px 16px;border-radius:10px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  color:#f3efe6;font-family:'IBM Plex Sans',sans-serif;font-size:16px;
  outline:none;text-align:center;letter-spacing:.1em;margin-bottom:12px;
}
.gate-input::placeholder{color:rgba(243,239,230,0.3);letter-spacing:0;}
.gate-input:focus{border-color:rgba(255,255,255,0.35);}
.gate-btn{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:var(--teal);color:#f3efe6;font-family:'IBM Plex Sans',sans-serif;
  font-size:15px;font-weight:600;transition:.15s;
}
.gate-btn:hover{background:var(--teal-deep);}
.gate-error{font-size:12.5px;color:#e07070;margin-top:10px;height:18px;}

/* ── MAIN APP ──────────────────────────────────────────────────── */
#app{display:none;}
#app.visible{display:block;}

.header{background:var(--ink);padding:20px 20px 0;position:sticky;top:0;z-index:10;
  padding-top:calc(20px + env(safe-area-inset-top, 0px));}
.header-inner{max-width:700px;margin:0 auto;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kicker{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(243,239,230,0.45);margin-bottom:4px;}
.header h1{font-family:'Fraunces',serif;font-weight:500;font-size:22px;color:#f3efe6;letter-spacing:-.01em;}
.reset-btn{font-size:12px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(243,239,230,0.6);cursor:pointer;font-family:inherit;}
.reset-btn:hover{background:rgba(255,255,255,0.14);}
.progress-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:14px;}
.progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:.3s;}
.tabs{display:flex;gap:2px;}
.tab-btn{flex:1;padding:9px 8px;border:none;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;font-weight:500;background:transparent;color:rgba(243,239,230,0.45);border-radius:8px 8px 0 0;transition:.15s;}
.tab-btn.active{background:var(--paper);color:var(--ink);}
.tab-count{margin-left:5px;font-size:11px;color:rgba(243,239,230,0.3);}
.tab-btn.active .tab-count{color:var(--teal);}
.content{max-width:700px;margin:0 auto;padding:18px 16px;}
.section-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:border-color .2s,background .2s;margin-bottom:8px;}
.section-card.all-done{background:var(--teal-light);border-color:rgba(31,93,82,0.3);}
.section-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;width:100%;background:none;border:none;text-align:left;}
.section-icon{font-size:17px;min-width:22px;}
.section-title{font-family:'Fraunces',serif;font-weight:500;font-size:16px;color:var(--ink);flex:1;}
.all-done .section-title{color:var(--teal-deep);}
.compliance-badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:var(--amber-light);color:var(--amber);border:1px solid rgba(160,107,26,0.2);white-space:nowrap;}
.section-count{font-size:12px;font-weight:600;color:var(--ink-soft);min-width:36px;text-align:right;}
.all-done .section-count{color:var(--teal);}
.chevron{font-size:10px;color:var(--ink-faint);transition:.2s;margin-left:4px;}
.section-body{padding:0 16px 14px;border-top:1px solid var(--line2);display:none;}
.section-body.open{display:block;}
.compliance-note{margin:10px 0;padding:8px 12px;border-radius:8px;background:var(--amber-light);border-left:3px solid var(--amber);font-size:12.5px;color:var(--amber);font-weight:500;line-height:1.5;}
.info-note{margin:10px 0;padding:8px 12px;border-radius:8px;background:var(--paper2);font-size:12.5px;color:var(--ink-soft);line-height:1.5;font-style:italic;}
.script-block{margin:8px 0;padding:10px 13px;border-radius:8px;background:var(--teal-light);border-left:3px solid var(--teal);font-size:13px;color:var(--teal-deep);line-height:1.6;font-family:'IBM Plex Mono',monospace;}
.script-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:5px;font-family:'IBM Plex Sans',sans-serif;}
.items-list{display:flex;flex-direction:column;gap:3px;margin-top:10px;}
.item-row{display:flex;align-items:flex-start;gap:9px;padding:5px 8px;border-radius:7px;cursor:pointer;transition:background .12s;}
.item-row:hover{background:rgba(28,27,24,0.04);}
.item-row.checked{background:rgba(31,93,82,0.06);}
.item-row.indent{padding-left:26px;}
.item-cb{margin-top:2px;accent-color:var(--teal);cursor:pointer;min-width:15px;}
.item-content{flex:1;}
.item-text{font-size:13.5px;line-height:1.5;color:var(--ink);}
.item-row.checked .item-text{text-decoration:line-through;opacity:.5;}
.item-text.bold{font-weight:600;}
.item-arrow{color:var(--ink-faint);margin-right:4px;font-size:12px;}
.item-script{margin-top:5px;padding:7px 10px;border-radius:6px;background:var(--teal-light);border-left:2px solid var(--teal);font-size:12px;color:var(--teal-deep);line-height:1.55;font-family:'IBM Plex Mono',monospace;}
.post-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;background:var(--card);border:1px solid var(--line);margin-bottom:4px;transition:.12s;}
.post-item.checked{background:rgba(31,93,82,0.07);border-color:rgba(31,93,82,0.2);}
.post-item.checked .item-text{text-decoration:line-through;opacity:.5;}
.c-dot{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:999px;background:var(--amber-light);color:var(--amber);border:1px solid rgba(160,107,26,0.2);margin-right:6px;}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">Property Clinic Solutions</div>
    <div class="gate-title">Meeting Guide</div>
    <input id="gate-pw" type="password" class="gate-input" placeholder="Enter password" autocomplete="current-password" />
    <button class="gate-btn" onclick="checkPassword()">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="kicker">Property Clinic Solutions</div>
          <h1>Protection Meeting Guide</h1>
        </div>
        <button class="reset-btn" onclick="resetCurrent()">Reset tab</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="setTab('m1')" id="tab-m1">Meeting One <span class="tab-count" id="count-m1"></span></button>
        <button class="tab-btn" onclick="setTab('m2')" id="tab-m2">Meeting Two <span class="tab-count" id="count-m2"></span></button>
        <button class="tab-btn" onclick="setTab('post')" id="tab-post">Post Meeting <span class="tab-count" id="count-post"></span></button>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── PASSWORD ─────────────────────────────────────────────────────────────────
// Change the password here:
const PASSWORD = 'pcs-protect';

function checkPassword(){
  const val = document.getElementById('gate-pw').value;
  if(val === PASSWORD){
    sessionStorage.setItem('pcs_auth','1');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    render();
  } else {
    document.getElementById('gate-error').textContent = 'Incorrect password.';
    document.getElementById('gate-pw').value = '';
  }
}
document.getElementById('gate-pw').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPassword();
});

// Auto-unlock if already authenticated this session
if(sessionStorage.getItem('pcs_auth') === '1'){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab = 'm1';
let checked = {};
try { checked = JSON.parse(localStorage.getItem('pcs_checks') || '{}'); } catch(e){}
function save(){ try{ localStorage.setItem('pcs_checks', JSON.stringify(checked)); }catch(e){} }
function resetCurrent(){
  const ids = getAllIds(currentTab === 'm1' ? M1 : currentTab === 'm2' ? M2 : POST_ITEMS);
  ids.forEach(id => delete checked[id]);
  save(); render();
}

// ─── DATA ────────────────────────────────────────────────────────────────────
const M1 = [
  {
    id:"pre", title:"Before the Meeting", icon:"📋",
    items:[
      {id:"pre1", text:"Book appointment via Microsoft Teams — use client email for the invite"},
      {id:"pre2", text:"Email the IDD to the client at the same time as the Teams invite"},
      {id:"pre3", text:"Confirm the meeting time and Teams link in the email"},
    ]
  },
  {
    id:"transcript", title:"Transcript Consent", icon:"🎙", compliance:true,
    complianceNote:"Record verbal consent in file before proceeding.",
    scripts:[
      {label:"Say this", text:'"Before we get into anything, just so you know I am going to turn on the meeting transcript now. It just means I can focus on you properly rather than taking notes throughout. Are you happy with that?"'}
    ],
    items:[
      {id:"tr1", text:"Turn on transcript before the meeting begins"},
      {id:"tr2", text:"Inform client and gain verbal permission"},
      {id:"tr3", text:"Note consent in file"},
    ]
  },
  {
    id:"welcome", title:"Welcome", icon:"👋",
    note:"Do not rush this. A comfortable client is an honest client. The quality of your fact-find depends on it.",
    scripts:[
      {label:"Example openers", text:'"How are you doing? How has the week been?"\n"How long have you been in the house now?"\n"How is the family? Kids keeping you busy?"'},
      {label:"Accessibility check", text:'"Is there anything I need to consider in how the meeting runs today? Anything that would help you get the most out of it?"'}
    ],
    items:[
      {id:"w1", text:"Take genuine time — do not rush straight into the agenda"},
      {id:"w2", text:"Make them feel comfortable and at ease"},
      {id:"w3", text:"Ask if there is anything to consider in how the meeting runs"},
    ]
  },
  {
    id:"idd", title:"IDD Check", icon:"📄", compliance:true,
    complianceNote:"IDD confirmed read or covered in full. Record in file.",
    scripts:[
      {label:"Opening question", text:'"Before we started I sent over a document called the Initial Disclosure Document. Did you get a chance to read through that?"'},
      {label:"If YES", text:'"Great. Any questions on anything in there, or are you happy with everything?"'},
      {label:"If NO — GDPR", text:'"No problem. So in terms of your data, we take GDPR seriously. The information you share with me today will not be passed on to anyone except the insurer at the point we make an application on your behalf. That is it."'},
      {label:"If NO — Fees", text:'"In terms of fees, we do not charge you anything for our advice. The way we are paid is through commission from the insurance company when a policy is placed. So this conversation, the research, all of it costs you nothing directly."'},
      {label:"If NO — Provider", text:'"And in terms of who we work with, Property Clinic Solutions is independent. We are not tied to any single insurer. We search the whole market to find the best fit for your specific situation. So whatever I recommend comes from research, not from a deal with a particular provider."'},
      {label:"Confirm", text:'"Are you happy with all of that before we move forward?"'}
    ],
    items:[
      {id:"idd1", text:"Ask if client has read the IDD"},
      {id:"idd2", text:"IF READ: any questions? Confirm happy", sub:true},
      {id:"idd3", text:"IF NOT READ: cover the three points below", sub:true},
      {id:"idd4", text:"GDPR — info only goes to insurer at application", sub:true, indent:true},
      {id:"idd5", text:"Fees — no charge to client, insurer pays commission", sub:true, indent:true},
      {id:"idd6", text:"Provider — PCS is whole of market, not tied to any single insurer", sub:true, indent:true},
      {id:"idd7", text:"Confirm client is happy before moving on"},
    ]
  },
  {
    id:"agenda", title:"Set the Agenda", icon:"🗓",
    scripts:[
      {label:"Full agenda script", text:'"Here is how today runs. I am going to ask you some questions to get a proper picture of your situation. Then we will work out what your actual needs are. I will summarise where we are, and then I will go away and do my research. When we speak again I will bring a recommendation and you can decide whether you want to go ahead or take some time. No recommendation today, nothing to sign. We are looking at around 30 to 60 minutes. Does that work?"'},
      {label:"Referral plant", text:'"And at the end, if today goes well, I would love to ask you about people you know who might benefit from the same conversation — but we will get to that."'}
    ],
    items:[
      {id:"ag1", text:"Meeting will take 30 to 60 minutes"},
      {id:"ag2", text:"No recommendation today and nothing to sign — state this clearly"},
      {id:"ag3", text:"Stage 1: Understand the situation"},
      {id:"ag4", text:"Stage 2: Identify needs"},
      {id:"ag5", text:"Stage 3: Research and come back with options"},
      {id:"ag6", text:"Stage 4: Recommend, apply, referrals"},
      {id:"ag7", text:"Confirm client is clear and happy to proceed"},
    ]
  },
  {
    id:"factfind", title:"Fact Find", icon:"🔍", compliance:true,
    complianceNote:"Read duty of care disclosure verbatim before starting. Record in file.",
    scripts:[
      {label:"Duty of care — read verbatim", text:'"You are under a duty to take reasonable care not to make any misrepresentation of the facts; failure to take reasonable care may affect any future claims."'},
      {label:"Sick pay — key question", text:'"This one is really important. If you were off sick tomorrow, what would your employer actually pay you? And how long for? What happens after that?"'},
      {label:"Existing cover", text:'"Do you have any life insurance, critical illness, or income protection anywhere at all? Either through work — things like death in service — or anything you have set up personally?"'},
      {label:"Savings context", text:'"And if you had to dip into savings, how much is there and how accessible is it? Not investments — just money you could get to quickly."'},
      {label:"Medical history", text:'"Any significant medical history I should know about? Anything you have been diagnosed with, treated for, or are currently taking medication for?"'},
      {label:"Mental health (ask directly)", text:'"And mental health — any history of anxiety, depression, stress-related conditions? I need to ask because it comes up in the application and we want to make sure everything is disclosed accurately."'}
    ],
    items:[
      {id:"ff0", text:"Read duty of care disclosure verbatim before any questions", bold:true},
      {id:"ff1", text:"Full name(s)"},
      {id:"ff2", text:"Date(s) of birth"},
      {id:"ff3", text:"Address"},
      {id:"ff4", text:"Dependants — who, ages"},
      {id:"ff5", text:"Job role and employment type (PAYE / self-employed / director)"},
      {id:"ff6", text:"Annual income before tax"},
      {id:"ff7", text:"Work benefits — death in service, private health, anything?"},
      {id:"ff8", text:"Any additional income — side work, rental, dividends"},
      {id:"ff9", text:"SICK PAY — full pay, half pay, SSP, then nothing?", bold:true},
      {id:"ff10", text:"Mortgage or rent — monthly amount"},
      {id:"ff11", text:"Mortgage outstanding balance and remaining term"},
      {id:"ff12", text:"Other debts — car finance, loans, leases"},
      {id:"ff13", text:"Living costs — utilities, council tax, childcare, school fees"},
      {id:"ff14", text:"Total essential monthly outgoings"},
      {id:"ff15", text:"Savings — how much, how accessible"},
      {id:"ff16", text:"Investments or ISAs"},
      {id:"ff17", text:"Existing cover — life, CI, IP anywhere (work or personal)?"},
      {id:"ff18", text:"Smoker in last 12 months?"},
      {id:"ff19", text:"Medical history — diagnosed, treated, on medication?"},
      {id:"ff20", text:"Mental health history — ask directly"},
      {id:"ff21", text:"Height and weight"},
    ]
  },
  {
    id:"abcdef", title:"ABCDEF — Picture Painting", icon:"🎨",
    note:"Lead with consequences, never products. Use their numbers throughout. Do not name a product until the priority question in F. Let the client do the maths out loud.",
    scripts:[
      {label:"A — Anchor income", text:'"When you applied for your mortgage, what was the one thing the lender cared most about? Your income is the engine. The [£X] you bring home every month is what pays the mortgage, covers the kids, runs the car, all of it. So everything I want to walk through today comes down to one question: what happens to all of that if the engine stops?"'},
      {label:"B — Open", text:'"Let me start with something completely ordinary. Nothing dramatic. Say you wake up tomorrow and your back has gone. You cannot sit, cannot drive, cannot work. The doctor signs you off for three months. It happens to people in your trade all the time."'},
      {label:"B — The gap", text:'"Your full sick pay runs for [X weeks]. After that you drop to Statutory Sick Pay — that is around £118 a week, so about £510 a month. But your essential outgoings are still [£X] every month. So from week [X], there is a gap of around [£X] a month going out with almost nothing coming in."'},
      {label:"B — Let them do the maths", text:'"How long do you think your savings would realistically cover that gap?"'},
      {label:"C — Transition", text:'"That was the ordinary version. Now let me change one thing. Same person, same situation, off work — but this time it is something serious. A diagnosis. Treatment. Months, not weeks."'},
      {label:"C — The difference", text:'"The income gap from before is still there, but it runs far longer. On top of that come the costs nobody plans for: getting to appointments, a partner maybe cutting their hours to help, wanting to clear some financial pressure so you can just focus on getting well rather than staring at the bills every morning. This is not about replacing your wage month by month. It is about a single sum of money that takes the financial worry completely off the table."'},
      {label:"D — Transition", text:'"Those last two, you are still here. Now the hardest one. I will be straight with you because that is more useful. What happens if you are not here."'},
      {label:"D — The numbers", text:'"If something happened to you tomorrow, that [£X] mortgage does not go anywhere. [Partner] is left on [£X] a month with [children / dependants]. Right now, is there enough there to clear the house and give them room to breathe?"'},
      {label:"D — No dependants version", text:'"You do not have dependants relying on your income, so this is less urgent than it would be for someone with a family. The mortgage sits against the estate, but there is no one who loses their livelihood if you are gone. I want to be honest about that — it changes the priority order."'},
      {label:"E — Brief", text:'"Whatever we look at, there are features that make cover actually work when it is needed. Locking the premium in so it can never go up. Making sure the cover pays for itself if you are too ill to work. I will factor those into the research."'},
      {label:"F — Summary", text:'"Let me pull the whole thing together on your numbers. If you are off for a few months with something ordinary, there is a gap of [£X] a month and savings that last about [X months]. If something serious happens, that gap runs far longer with extra costs piling on. And if the worst happens, there is a [£X] mortgage and a family who still need that home. At the moment, all of that sits on your shoulders alone. Is that a fair picture?"'},
      {label:"F — Priority question", text:'"Put those three risks in order for me. Income risk, serious illness risk, death risk. Most important to least, and tell me why."'},
      {label:"F — Pushback if death first (employed, low sick pay)", text:'"I hear you, and the instinct to protect the family is exactly right. But can I push back on that order? You are [age], non-smoker, in good health. The statistical likelihood of you dying before the end of that mortgage is relatively low. The far more likely scenario is that at some point in the next [X] years you cannot work. Your sick pay runs out in [X weeks] and your savings last [X months]. If you are off for 6 months, your family is in the same position as if you died. The mortgage does not get paid either way. The outcome is identical. The route is just different, and statistically far more probable."'},
      {label:"F — Confirm revised order", text:'"So does that change the order for you? I want the recommendation I bring back to reflect the actual risk, not just what feels most dramatic."'}
    ],
    items:[
      {id:"a1", text:"A — Anchor income. Use the mortgage application as the hook.", bold:true},
      {id:"b1", text:"B — Paint the ordinary illness or injury scenario", bold:true},
      {id:"b2", text:"Use their actual sick pay and outgoings to show the monthly gap"},
      {id:"b3", text:"Ask: how long do their savings cover that gap?"},
      {id:"b4", text:"Let them do the maths out loud — do not answer for them"},
      {id:"c1", text:"C — Upgrade to serious diagnosis", bold:true},
      {id:"c2", text:"Income gap still there but longer. Plus the extra costs pile on"},
      {id:"c3", text:"Frame C as a lump sum need, not income replacement — different problem"},
      {id:"d1", text:"D — Death. Be direct, not dramatic", bold:true},
      {id:"d2", text:"Use their mortgage balance and household income to show the gap"},
      {id:"d3", text:"If no dependants: be honest this is lower priority and explain why"},
      {id:"e1", text:"E — Briefly mention guaranteed premiums and waiver of premium"},
      {id:"f1", text:"F — Summarise all three risks on their actual numbers", bold:true},
      {id:"f2", text:"Ask: put those three risks in order and tell me why", bold:true},
      {id:"f3", text:"Listen to the answer — then push back if the data supports a different order"},
      {id:"f4", text:"If death first and they have low sick pay: challenge with the statistics"},
      {id:"f5", text:"Agree the revised priority together"},
      {id:"f6", text:"Record BOTH the initial answer and the revised priority in the file", bold:true},
    ]
  },
  {
    id:"budget", title:"Budget", icon:"💷", compliance:true,
    complianceNote:"Confirmed budget must be recorded in file.",
    note:"Budget is based on HOUSEHOLD disposable income. Always include partner income if applicable. Do not just accept the first number they give.",

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getAllIds(data){
  if(!data[0]?.items) return data.map(i=>i.id);
  return data.flatMap(s=>s.items.map(i=>i.id));
}
function countChecked(data){
  const ids = getAllIds(data);
  return {done: ids.filter(id=>checked[id]).length, total: ids.length};
}
function setTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  updateCounts(); render();
}
function updateCounts(){
  ['m1','m2','post'].forEach(t=>{
    const data = t==='m1'?M1:t==='m2'?M2:POST_ITEMS;
    const {done,total} = countChecked(data);
    document.getElementById('count-'+t).textContent = done+'/'+total;
  });
  const data = currentTab==='m1'?M1:currentTab==='m2'?M2:POST_ITEMS;
  const {done,total} = countChecked(data);
  const pct = Math.round((done/total)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
}
function toggleCheck(id){
  checked[id] = !checked[id];
  save();
  const row = document.querySelector('[data-id="'+id+'"]');
  if(row){
    row.classList.toggle('checked', !!checked[id]);
    const cb = row.querySelector('input[type=checkbox]');
    if(cb) cb.checked = !!checked[id];
  }
  const section = row?.closest('.section-card');
  if(section) updateSectionDone(section);
  updateCounts();
}
function updateSectionDone(card){
  const cbs = card.querySelectorAll('input[type=checkbox]');
  const allDone = [...cbs].every(cb=>cb.checked);
  card.classList.toggle('all-done', allDone);
  const countEl = card.querySelector('.section-count');
  if(countEl){
    const done = [...cbs].filter(cb=>cb.checked).length;
    countEl.textContent = done+'/'+cbs.length;
    countEl.style.color = allDone ? 'var(--teal)' : 'var(--ink-soft)';
  }
}
function toggleSection(id){
  const body = document.getElementById('body-'+id);
  const chevron = document.getElementById('chev-'+id);
  const open = body.classList.toggle('open');
  chevron.textContent = open ? '▲' : '▼';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const container = document.getElementById('content');
  if(!container) return;
  const data = currentTab==='m1'?M1:currentTab==='m2'?M2:null;
  if(data){
    container.innerHTML = data.map(section => {
      const ids = section.items.map(i=>i.id);
      const done = ids.filter(id=>checked[id]).length;
      const total = ids.length;
      const allDone = done===total;
      const scripts = (section.scripts||[]);
      const singleScript = section.script;
      return `<div class="section-card${allDone?' all-done':''}" id="card-${section.id}">
        <button class="section-header" onclick="toggleSection('${section.id}')">
          <span class="section-icon">${section.icon}</span>
          <span class="section-title">${esc(section.title)}</span>
          ${section.compliance?'<span class="compliance-badge">compliance</span>':''}
          <span class="section-count">${done}/${total}</span>
          <span class="chevron" id="chev-${section.id}">▼</span>
        </button>
        <div class="section-body" id="body-${section.id}">
          ${section.compliance&&section.complianceNote?`<div class="compliance-note">COMPLIANCE: ${esc(section.complianceNote)}</div>`:''}
          ${section.note?`<div class="info-note">${esc(section.note)}</div>`:''}
          ${singleScript?`<div class="script-block">${esc(singleScript)}</div>`:''}
          ${scripts.map(s=>`<div class="script-label">${esc(s.label)}</div><div class="script-block">${esc(s.text)}</div>`).join('')}
          <div class="items-list">
            ${section.items.map(item=>`
              <div class="item-row${checked[item.id]?' checked':''}${item.indent?' indent':''}" data-id="${item.id}" onclick="toggleCheck('${item.id}')">
                <input type="checkbox" class="item-cb" ${checked[item.id]?'checked':''} onclick="event.stopPropagation();toggleCheck('${item.id}')" />
                <div class="item-content">
                  <span class="item-text${item.bold?' bold':''}">${item.sub?'<span class="item-arrow">↳</span>':''}${esc(item.text)}</span>
                  ${item.script?`<div class="item-script">${esc(item.script)}</div>`:''}
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    container.innerHTML = `<div style="display:flex;flex-direction:column;gap:4px;">
      ${POST_ITEMS.map(item=>`
        <div class="post-item${checked[item.id]?' checked':''}" data-id="${item.id}" onclick="toggleCheck('${item.id}')">
          <input type="checkbox" class="item-cb" ${checked[item.id]?'checked':''} onclick="event.stopPropagation();toggleCheck('${item.id}')" />
          <span class="item-text">${item.compliance?'<span class="c-dot">C</span>':''}${esc(item.text)}</span>
        </div>`).join('')}
    </div>`;
  }
  updateCounts();
}
