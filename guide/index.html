<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>PCS — Protection Meeting Guide</title>
<link rel="manifest" href="/guide/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Meeting Guide"/>
<meta name="theme-color" content="#0C1A3A"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#002AB1;--blue-h:#00239A;--blue-t:#E7ECFA;
  --ink:#0C1A3A;--emerald:#109E6C;--emerald-t:#E3F4EC;--emerald-h:#0E8C60;
  --gold:#DB9F1F;--gold-t:#FBF2DB;
  --paper:#F7F7F4;--card:#FFFFFF;--sunken:#EEF0F4;
  --n200:#E6E7EC;--n300:#D3D7E0;--n400:#AEB4C2;--n500:#7E8699;--n600:#5A6173;--n700:#3D4254;
  --f:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--ink);color:var(--ink)}

/* GATE */
#gate{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
#gate.hidden{display:none}
.g-box{width:100%;max-width:300px;text-align:center}
.g-eye{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px;font-weight:700}
.g-ttl{font-size:28px;font-weight:800;color:#fff;margin-bottom:28px;letter-spacing:-.02em}
.g-in{width:100%;padding:13px 16px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#fff;font-family:var(--f);font-size:16px;outline:none;text-align:center;letter-spacing:.1em;margin-bottom:10px}
.g-in::placeholder{color:rgba(255,255,255,.25);letter-spacing:0}
.g-in:focus{border-color:rgba(255,255,255,.4)}
.g-btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;background:var(--blue);color:#fff;font-family:var(--f);font-size:15px;font-weight:700;transition:.15s}
.g-btn:hover{background:var(--blue-h)}
.g-err{font-size:12px;color:#f08080;margin-top:8px;height:18px}

/* APP SHELL */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

/* TOP BAR */
.topbar{background:var(--ink);flex-shrink:0;padding-top:env(safe-area-inset-top,0)}
.topbar-inner{max-width:700px;margin:0 auto;padding:12px 16px 0}
.topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rank-pill{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.ri{font-size:18px}
.rn{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rx{font-size:10px;color:var(--gold);font-weight:600}
.xp-num{font-size:13px;font-weight:800;color:var(--gold)}
.rst-btn{font-size:11px;padding:5px 9px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);cursor:pointer;font-family:var(--f);font-weight:600;transition:.15s}
.rst-btn:hover{background:rgba(255,255,255,.14)}
.xp-track{height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:10px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--emerald));border-radius:3px;transition:.4s cubic-bezier(.34,1.56,.64,1)}
.tabs{display:flex;gap:2px}
.tab{flex:1;padding:9px 8px;border:none;cursor:pointer;font-family:var(--f);font-size:12px;font-weight:700;background:transparent;color:rgba(255,255,255,.4);border-radius:8px 8px 0 0;transition:.15s;line-height:1}
.tab.on{background:var(--paper);color:var(--ink)}
.tc{font-size:10px;opacity:.6;margin-left:3px}
.tab.on .tc{color:var(--blue);opacity:1}

/* STAGE */
.stage{flex:1;overflow-y:auto;background:var(--paper);-webkit-overflow-scrolling:touch}
.stage-inner{max-width:700px;margin:0 auto;padding:14px 14px calc(90px + env(safe-area-inset-bottom,0))}

/* SECTION NAV STRIP */
.snav{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.snav::-webkit-scrollbar{display:none}
.sn-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;padding:2px 4px;border-radius:10px;transition:background .15s}
.sn-item:active{background:rgba(0,42,177,.08)}
.sn-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--n300);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--n400);transition:.2s;background:var(--card)}
.sn-item.done .sn-dot{background:var(--emerald);border-color:var(--emerald);color:#fff}
.sn-item.cur .sn-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.sn-lbl{font-size:9px;font-weight:700;color:var(--n500);text-align:center;max-width:52px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1}
.sn-item.cur .sn-lbl{color:var(--blue);font-weight:800}
.sn-item.done .sn-lbl{color:var(--emerald)}

/* SECTION CARD */
.sec-card{background:var(--card);border-radius:18px;overflow:hidden;border:1.5px solid var(--n200)}
.sec-accent{height:4px;background:var(--blue)}
.sec-accent.compliance{background:var(--gold)}
.sec-head{padding:18px 18px 14px;border-bottom:1.5px solid var(--n200)}
.sec-title-row{display:flex;align-items:center;gap:10px}
.sec-icon{font-size:24px}
.sec-title{font-size:18px;font-weight:800;color:var(--ink);flex:1;letter-spacing:-.02em}
.cbadge{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;background:var(--gold-t);color:var(--gold);border:1px solid rgba(219,159,31,.25)}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.prog-track{flex:1;height:3px;background:var(--n200);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--emerald));border-radius:2px;transition:width .4s cubic-bezier(.34,1.56,.64,1)}
.prog-label{font-size:11px;font-weight:700;color:var(--n500);white-space:nowrap}
.cn-bar{display:flex;align-items:flex-start;gap:8px;padding:11px 18px;background:var(--gold-t);border-bottom:1px solid rgba(219,159,31,.2);font-size:12.5px;color:#7a5a0a;font-weight:600;line-height:1.55}
.note-bar{padding:11px 18px;background:var(--sunken);border-bottom:1px solid var(--n200);font-size:12.5px;color:var(--n600);line-height:1.6;font-style:italic}

/* SCRIPTS */
.scripts-area{padding:16px 18px;background:var(--sunken)}
.script-card{background:var(--card);border-radius:12px;border:1px solid var(--n200);border-left:3.5px solid var(--blue);padding:14px 16px;margin-bottom:8px}
.script-card:last-child{margin-bottom:0}
.script-card.note-style{border-left-color:var(--gold)}
.s-lbl{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:7px}
.note-style .s-lbl{color:var(--gold)}
.s-txt{font-size:14.5px;line-height:1.8;color:var(--n700)}
.s-txt.quote{font-style:italic}

/* CONFIRMS */
.confirms{padding:14px 18px 18px}
.confirms-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--n400);margin-bottom:10px}
.conf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.conf-grid.solo{grid-template-columns:1fr}
.conf-btn{background:var(--paper);border:2px solid var(--n200);border-radius:14px;padding:14px 14px 12px;cursor:pointer;text-align:left;transition:.15s;display:flex;flex-direction:column;gap:6px;min-height:72px}
.conf-btn:active{background:var(--blue-t)}
.conf-btn.done{background:var(--emerald-t);border-color:rgba(16,158,108,.35)}
.conf-inner{display:flex;align-items:flex-start;gap:8px}
.conf-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--n300);display:flex;align-items:center;justify-content:center;background:var(--card);flex-shrink:0;margin-top:1px;transition:.15s}
.conf-btn.done .conf-check{background:var(--emerald);border-color:var(--emerald)}
.conf-check svg{opacity:0;transition:opacity .15s}
.conf-btn.done .conf-check svg{opacity:1}
.conf-text{font-size:12.5px;line-height:1.45;color:var(--ink);font-weight:500}
.conf-btn.done .conf-text{text-decoration:line-through;opacity:.4}
.conf-btn.bold-item .conf-text{font-weight:700}
.conf-xp{font-size:10px;font-weight:700;color:var(--n400);padding-left:28px}
.conf-btn.done .conf-xp{color:var(--emerald)}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:1px solid rgba(255,255,255,.07);padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));z-index:20}
.bot-nav-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:10px}
.nav-btn{flex:1;padding:12px 14px;border-radius:12px;border:none;cursor:pointer;font-family:var(--f);font-size:13px;font-weight:700;transition:.15s}
.nav-btn.prev-btn{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);text-align:left}
.nav-btn.next-btn{background:var(--blue);color:#fff;text-align:right}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn.next-btn:disabled{background:rgba(255,255,255,.07)}
.nav-mid{text-align:center;flex-shrink:0}
.nav-pos{font-size:11px;font-weight:700;color:rgba(255,255,255,.35)}

/* POST TAB */
.post-grid{display:flex;flex-direction:column;gap:6px}
.post-btn{background:var(--card);border:1.5px solid var(--n200);border-radius:14px;padding:14px 16px;cursor:pointer;text-align:left;transition:.15s;display:flex;align-items:flex-start;gap:12px}
.post-btn:active{background:var(--sunken)}
.post-btn.done{background:var(--emerald-t);border-color:rgba(16,158,108,.3)}
.post-btn.done .post-text{text-decoration:line-through;opacity:.38}
.post-btn.done .conf-check{background:var(--emerald);border-color:var(--emerald)}
.post-btn.done .conf-check svg{opacity:1}
.post-text{font-size:13.5px;line-height:1.5;color:var(--ink);font-weight:500;flex:1}
.cpip{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:999px;background:var(--gold-t);color:var(--gold);border:1px solid rgba(219,159,31,.25);margin-right:4px}

/* ANIMATIONS */
.xp-pop{position:fixed;pointer-events:none;font-size:13px;font-weight:800;color:var(--gold);z-index:999}
@keyframes xp-rise{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-28px) scale(1.1)}100%{opacity:0;transform:translateY(-54px) scale(.9)}}
#toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%) translateY(60px);z-index:100;background:var(--ink);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;box-shadow:0 6px 24px rgba(12,26,58,.4);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;border:1px solid rgba(255,255,255,.1)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#rank-up{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s}
#rank-up.show{opacity:1}
.ru-box{background:var(--ink);border:2px solid var(--gold);border-radius:20px;padding:28px 36px;text-align:center;transform:scale(.8);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
#rank-up.show .ru-box{transform:scale(1)}
.ru-icon{font-size:48px;margin-bottom:8px}
.ru-sub{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.ru-name{font-size:22px;font-weight:800;color:#fff}
.cb{position:fixed;top:-10px;pointer-events:none;z-index:200;border-radius:2px;opacity:0}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}
</style>
</head>
<body>

<div id="gate">
  <div class="g-box">
    <div class="g-eye">Property Clinic Solutions</div>
    <div class="g-ttl">Meeting Guide</div>
    <input id="gpw" type="password" class="g-in" placeholder="Password" autocomplete="current-password"/>
    <button class="g-btn" onclick="checkPw()">Unlock</button>
    <div class="g-err" id="gerr"></div>
  </div>
</div>

<div id="toast"></div>
<div id="rank-up"><div class="ru-box"><div class="ru-icon" id="ru-icon"></div><div class="ru-sub">Rank Up!</div><div class="ru-name" id="ru-name"></div></div></div>

<div id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-row">
        <div class="rank-pill">
          <div class="ri" id="hd-icon"></div>
          <div><div class="rn" id="hd-rank"></div><div class="rx" id="hd-next"></div></div>
        </div>
        <span class="xp-num" id="hd-xp"></span>
        <button class="rst-btn" onclick="resetTab()">Reset</button>
      </div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      <div class="tabs">
        <button class="tab on" id="tab-m1" onclick="setTab('m1')">Meeting 1<span class="tc" id="tc-m1"></span></button>
        <button class="tab" id="tab-m2" onclick="setTab('m2')">Meeting 2<span class="tc" id="tc-m2"></span></button>
        <button class="tab" id="tab-post" onclick="setTab('post')">Post<span class="tc" id="tc-post"></span></button>
      </div>
    </div>
  </div>
  <div class="stage" id="stage">
    <div class="stage-inner" id="stage-inner"></div>
  </div>
  <div class="bot-nav" id="bot-nav"></div>
</div>

<script>
const PW='pcs-protect';
function checkPw(){
  if(document.getElementById('gpw').value===PW){
    sessionStorage.setItem('pcs_auth','1');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    boot();
  } else {
    document.getElementById('gerr').textContent='Incorrect password.';
    document.getElementById('gpw').value='';
  }
}
document.getElementById('gpw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(sessionStorage.getItem('pcs_auth')==='1'){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}

const RANKS=[
  {name:'Getting Started',    icon:'🌱',min:0},
  {name:'Building Confidence',icon:'📋',min:50},
  {name:'Protection Adviser', icon:'🛡️',min:150},
  {name:'Compliance Pro',     icon:'⚖️',min:300},
  {name:'Client Champion',    icon:'🏆',min:500},
  {name:'Meeting Legend',     icon:'🌟',min:750},
];
function getRank(xp){let r=RANKS[0];for(const x of RANKS)if(xp>=x.min)r=x;return r;}
function getNext(xp){return RANKS.find(r=>r.min>xp)||null;}

let curTab='m1',curIdx=0,checked={},lastRank=null;
try{checked=JSON.parse(localStorage.getItem('pcs_checks')||'{}');}catch(e){}
function save(){try{localStorage.setItem('pcs_checks',JSON.stringify(checked));}catch(e){}}
function resetTab(){getAllIds(getTabData()).forEach(id=>delete checked[id]);save();render();updateXP();}

const M1=[
  {id:"pre",title:"Before",icon:"📋",
    items:[
      {id:"pre1",text:"Appointment booked — IDD emailed at same time"},
      {id:"pre2",text:"Meeting time and Teams link confirmed"},
    ]},
  {id:"transcript",title:"Transcript",icon:"🎙",compliance:true,
    complianceNote:"Record verbal consent in file before proceeding.",
    scripts:[
      {label:"Say this",text:'"Before we get into anything — I am going to turn on the meeting transcript now. It means I can focus on you properly rather than taking notes. Are you happy with that?"'},
    ],
    items:[
      {id:"tr1",text:"Transcript on"},
      {id:"tr2",text:"Consent noted in file"},
    ]},
  {id:"welcome",title:"Welcome",icon:"👋",
    note:"A comfortable client is an honest client.",
    scripts:[
      {label:"Openers",text:'"How are you doing? How has the week been?"\n"How long have you been in the house now?"\n"How is the family?"'},
      {label:"Accessibility check",text:'"Is there anything I need to consider in how the meeting runs today?"'},
    ],
    items:[
      {id:"w1",text:"Accessibility check done"},
    ]},
  {id:"idd",title:"IDD Check",icon:"📄",compliance:true,
    complianceNote:"IDD confirmed read or fully covered. Record in file.",
    scripts:[
      {label:"Opening",text:'"Did you get a chance to read the Initial Disclosure Document I sent?"'},
      {label:"If YES",text:'"Great. Any questions — or happy with everything?"'},
      {label:"If NO — cover these three",text:'"Your data — only goes to the insurer at point of application.\n\nFees — no charge to you. We are paid commission by the insurer.\n\nProvider — independent, whole of market, not tied to any single insurer."'},
    ],
    items:[
      {id:"idd1",text:"IDD read or covered in full"},
      {id:"idd2",text:"Client confirmed happy to proceed"},
    ]},
  {id:"agenda",title:"Agenda",icon:"🗓",
    scripts:[
      {label:"Script",text:'"Here is how today runs. Questions first, then we work out your actual needs. I go away, do my research, come back with a recommendation. You decide then. No recommendation today, nothing to sign. Around 30 to 60 minutes. Does that work?"'},
      {label:"Referral plant",text:'"At the end, if today goes well, I would love to ask you about people you know who might benefit from the same conversation."'},
    ],
    items:[
      {id:"ag1",text:"No recommendation today, nothing to sign — said clearly"},
    ]},
  {id:"factfind",title:"Fact Find",icon:"🔍",compliance:true,
    complianceNote:"Read duty of care disclosure verbatim before any questions.",
    scripts:[
      {label:"Duty of care — read verbatim",text:'"You are under a duty to take reasonable care not to make any misrepresentation of the facts; failure to take reasonable care may affect any future claims."'},
      {label:"Sick pay — the critical question",text:'"If you were off sick tomorrow, what would your employer actually pay you, and how long for? What happens after that?"'},
      {label:"Existing cover",text:'"Do you have any life insurance, critical illness, or income protection anywhere — through work or personally?"'},
      {label:"Medical history",text:'"Any significant medical history? Anything diagnosed, treated, or currently on medication for?"'},
      {label:"Mental health — ask directly",text:'"And mental health — any history of anxiety, depression, stress-related conditions? I need to ask because it comes up in the application."'},
    ],
    items:[
      {id:"ff0",text:"Duty of care read verbatim",bold:true},
      {id:"ff1",text:"Dependants — who, ages"},
      {id:"ff2",text:"Employment type — PAYE / self-employed / director"},
      {id:"ff3",text:"Work benefits — death in service, PHI"},
      {id:"ff4",text:"Sick pay — full / half / SSP / nothing",bold:true},
      {id:"ff5",text:"Mortgage outstanding + remaining term"},
      {id:"ff6",text:"Total essential monthly outgoings"},
      {id:"ff7",text:"Savings — amount and accessibility"},
      {id:"ff8",text:"Existing cover anywhere"},
      {id:"ff9",text:"Smoker in last 12 months"},
      {id:"ff10",text:"Medical history covered"},
      {id:"ff11",text:"Mental health — asked directly",bold:true},
      {id:"ff12",text:"Height and weight"},
    ]},
  {id:"abcdef",title:"ABCDEF",icon:"🎨",
    note:"Lead with consequences, never products. Use their numbers. Let the client do the maths out loud.",
    scripts:[
      {label:"A — Anchor income",text:'"When you applied for your mortgage, what was the one thing the lender cared most about? Your income is the engine — the [£X] you bring home is what pays the mortgage, covers the kids, runs the car. Everything comes down to one question: what happens if the engine stops?"'},
      {label:"B — Ordinary illness",text:'"Say you wake up tomorrow and your back has gone. Doctor signs you off for three months. Full sick pay runs for [X weeks]. After that — Statutory Sick Pay, around £118 a week. Outgoings are still [£X] every month. How long do savings cover that gap?"'},
      {label:"C — Serious diagnosis",text:'"Same person, off work — but this time a diagnosis. Months, not weeks. The income gap runs far longer. Plus costs nobody plans for: appointments, a partner cutting hours. Not replacing your wage month by month — a single sum that takes the financial worry off the table."'},
      {label:"D — Death",text:'"If something happened to you tomorrow, that [£X] mortgage does not go anywhere. [Partner] is left on [£X] with [dependants]. Right now — is there enough to clear the house and give them room to breathe?"'},
      {label:"D — No dependants",text:'"You do not have dependants relying on your income, so this is less urgent. Being honest about that — it changes the priority order."'},
      {label:"F — Summary and priority question",text:'"[Summarise all three risks on their actual numbers.]\n\nPut those three risks in order. Income risk, serious illness, death. Most important to least — and tell me why."'},
      {label:"F — If death first, push back",text:'"The instinct to protect the family is right — but your sick pay runs out in [X weeks] and savings last [X months]. Off for 6 months? Your family is in the same position as if you died — mortgage does not get paid either way. Same outcome, far more probable route. Does that change the order?"'},
    ],
    items:[
      {id:"a1",text:"A — Income anchored using the mortgage",bold:true},
      {id:"b1",text:"B — Client did the maths out loud on the gap"},
      {id:"c1",text:"C — Framed as lump sum, not income replacement"},
      {id:"d1",text:"D — No dependants? Honest about lower priority"},
      {id:"f1",text:"Priority order agreed and recorded",bold:true},
    ]},
  {id:"budget",title:"Budget",icon:"💷",compliance:true,
    complianceNote:"Confirmed budget must be recorded in file.",
    note:"Work from household disposable income. Never suggest a number — let them name it.",
    scripts:[
      {label:"The rule",text:"Never say a number first. Use comfortable, not budget — budget signals a cap, comfortable signals a decision. Ask, then stop talking. The first person to speak loses."},
      {label:"The question",text:'"Based on everything you have told me — if we put something in place that covers your most important risk properly — what monthly figure would feel comfortable?"\n\n[Ask. Then stop. Say nothing.]'},
      {label:'If they say "I don\'t know"',text:'"That is fine. If cost were no factor — what would ideal protection look like?\n\n[Let them describe it. Then:]\n\n"Right. You have around [£X] disposable a month. Cover that properly closes your biggest risk typically sits in the [£A–£B] range on a household like yours. Where inside that feels workable?"'},
      {label:"If the number is low — the ladder",text:'"Before you land on that — the difference between [£X] and [£Y] a month is [describe the cover gap]. For that extra [amount] we go from partially covered to properly covered. Worth knowing before you decide."'},
      {label:"Self-employed",text:'"Is [£X] comfortable on a quieter month? I want whatever we put in place to stay in place when work gets quiet."'},
      {label:"Will not commit",text:'"No problem. I will bring two options back — conservative and full cover. Real numbers, you decide."'},
    ],

const POST_ITEMS=[
  {id:"p1",text:"Protection Submission Form — within 24h of decision",compliance:true},
  {id:"p2",text:"Smartr365 updated — within 5 days (not working days)",compliance:true},
  {id:"p3",text:"Income proof uploaded — IP or any policy over £150/month",compliance:true},
  {id:"p4",text:"Suitability letter issued and proof of sending saved",compliance:true},
  {id:"p5",text:"Medical Disclaimer saved (not required for MetLife)",compliance:true},
  {id:"p6",text:"Priority question recorded — initial and revised answers",compliance:true},
  {id:"p7",text:"Budget confirmed and recorded"},
  {id:"p8",text:"Case check: 5 days after submission — Pass or Pending With Adviser"},
];

function getTabData(){return curTab==='m1'?M1:curTab==='m2'?M2:POST_ITEMS;}
function getAllIds(data){
  if(!data[0]?.items)return data.map(i=>i.id);
  return data.flatMap(s=>s.items.map(i=>i.id));
}
function countChecked(data){
  const ids=getAllIds(data);
  return{done:ids.filter(id=>checked[id]).length,total:ids.length};
}
function secPts(sec){return sec.compliance?10:5;}
function calcTotalXP(){
  let xp=0;
  for(const s of M1)for(const i of s.items)if(checked[i.id])xp+=secPts(s);
  for(const s of M2)for(const i of s.items)if(checked[i.id])xp+=secPts(s);
  for(const i of POST_ITEMS)if(checked[i.id])xp+=i.compliance?10:5;
  return xp;
}
function updateXP(){
  const xp=calcTotalXP();
  const rank=getRank(xp);
  const next=getNext(xp);
  document.getElementById('hd-icon').textContent=rank.icon;
  document.getElementById('hd-rank').textContent=rank.name;
  document.getElementById('hd-xp').textContent=xp+' XP';
  document.getElementById('hd-next').textContent=next?(next.min-xp)+' XP to '+next.name:'🏆 Max rank!';
  const pct=next?Math.round(((xp-rank.min)/(next.min-rank.min))*100):100;
  document.getElementById('xp-fill').style.width=pct+'%';
  if(lastRank&&lastRank.name!==rank.name)showRankUp(rank);
  lastRank=rank;
  ['m1','m2','post'].forEach(t=>{
    const d=t==='m1'?M1:t==='m2'?M2:POST_ITEMS;
    const{done,total}=countChecked(d);
    document.getElementById('tc-'+t).textContent=done+'/'+total;
  });
}

let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
let ruT;
function showRankUp(rank){
  document.getElementById('ru-icon').textContent=rank.icon;
  document.getElementById('ru-name').textContent=rank.name;
  const el=document.getElementById('rank-up');el.classList.add('show');clearTimeout(ruT);
  ruT=setTimeout(()=>el.classList.remove('show'),2400);confetti(14);
}
const CC=['#002AB1','#109E6C','#DB9F1F','#E7ECFA','#fff'];
function confetti(n=18){for(let i=0;i<n;i++){const b=document.createElement('div');b.className='cb';const w=5+Math.random()*9,h=5+Math.random()*9;b.style.cssText=`left:${10+Math.random()*80}vw;width:${w}px;height:${h}px;background:${CC[Math.floor(Math.random()*CC.length)]};animation:cf ${1.2+Math.random()*1.2}s ${Math.random()*.4}s ease-in forwards;`;document.body.appendChild(b);setTimeout(()=>b.remove(),3000);}}
function xpPop(el,pts){const r=el.getBoundingClientRect();const p=document.createElement('div');p.className='xp-pop';p.textContent='+'+pts+' XP';p.style.cssText=`left:${r.right+4}px;top:${r.top}px;animation:xp-rise .75s ease-out forwards;`;document.body.appendChild(p);setTimeout(()=>p.remove(),800);}
const SMSGS=['Done! ✅','On a roll! 🔥','Keep going! ⚡','Boss move! 💪','Smashing it! 🚀'];let smIdx=0;

const SVG_CHECK=`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3 6-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function setTab(t){
  curTab=t;curIdx=0;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  render();
}
function goTo(idx){
  const data=getTabData();
  if(curTab==='post'||idx<0||idx>=data.length)return;
  curIdx=idx;render();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});
}
function toggleItem(id,el,pts){
  const was=!!checked[id];checked[id]=!was;save();
  if(!was)xpPop(el,pts);
  const btn=document.querySelector('[data-id="'+id+'"]');
  if(btn)btn.classList.toggle('done',!!checked[id]);
  updateXP();
  if(!was){
    const sec=getTabData()[curIdx];
    if(sec&&sec.items.every(i=>checked[i.id])){toast(SMSGS[smIdx%SMSGS.length]);smIdx++;confetti(10);}
  }
  updateNavDots();updateSectionProg();
}
function togglePost(id,el,pts){
  const was=!!checked[id];checked[id]=!was;save();
  if(!was)xpPop(el,pts);
  const btn=document.querySelector('[data-id="'+id+'"]');
  if(btn)btn.classList.toggle('done',!!checked[id]);
  const{done,total}=countChecked(POST_ITEMS);
  if(done===total&&!was){toast('All admin done! 🏆');confetti(25);}
  updateXP();
}
function updateNavDots(){
  const data=getTabData();if(curTab==='post')return;
  data.forEach((sec,i)=>{
    const el=document.getElementById('sn-'+i);if(!el)return;
    const done=sec.items.every(x=>checked[x.id]);const cur=i===curIdx;
    el.className='sn-item'+(cur?' cur':done?' done':'');
  });
}
function updateSectionProg(){
  const data=getTabData();if(curTab==='post')return;
  const sec=data[curIdx];
  const ids=sec.items.map(i=>i.id);
  const done=ids.filter(id=>checked[id]).length;
  const pf=document.getElementById('s-pf');const pl=document.getElementById('s-pl');
  if(pf)pf.style.width=Math.round((done/ids.length)*100)+'%';
  if(pl)pl.textContent=done+'/'+ids.length;
}

function render(){
  const inner=document.getElementById('stage-inner');
  const bot=document.getElementById('bot-nav');
  const data=getTabData();

  if(curTab==='post'){
    inner.innerHTML=`<div class="post-grid">${POST_ITEMS.map(item=>`
      <div class="post-btn${checked[item.id]?' done':''}" data-id="${item.id}" onclick="togglePost('${item.id}',this,${item.compliance?10:5})">
        <div class="conf-check">${SVG_CHECK}</div>
        <span class="post-text">${item.compliance?'<span class="cpip">C</span>':''}${esc(item.text)}</span>
      </div>`).join('')}</div>`;
    bot.innerHTML='';updateXP();return;
  }

  const sec=data[curIdx];
  const ids=sec.items.map(i=>i.id);
  const done=ids.filter(id=>checked[id]).length;
  const pct=Math.round((done/ids.length)*100);
  const pts=secPts(sec);

  const navHtml=`<div class="snav" id="snav">${data.map((s,i)=>{
    const sd=s.items.every(x=>checked[x.id]);const cur=i===curIdx;
    return`<div class="sn-item${cur?' cur':sd?' done':''}" id="sn-${i}" onclick="goTo(${i})"><div class="sn-dot">${i+1}</div><div class="sn-lbl">${s.title}</div></div>`;
  }).join('')}</div>`;

  const scripts=(sec.scripts||[]).map(s=>{
    const isNote=!s.text.trim().startsWith('"');const isQ=s.text.trim().startsWith('"');
    return`<div class="script-card${isNote?' note-style':''}"><div class="s-lbl">${esc(s.label)}</div><div class="s-txt${isQ?' quote':''}">${esc(s.text)}</div></div>`;
  }).join('');

  const solo=ids.length<=2;
  const confirms=sec.items.map(item=>`
    <div class="conf-btn${checked[item.id]?' done':''}${item.bold?' bold-item':''}" data-id="${item.id}" onclick="toggleItem('${item.id}',this,${pts})">
      <div class="conf-inner"><div class="conf-check">${SVG_CHECK}</div><span class="conf-text">${esc(item.text)}</span></div>
      <div class="conf-xp">${checked[item.id]?'✓ +'+pts+' XP':'+'+pts+' XP'}</div>
    </div>`).join('');

  inner.innerHTML=`${navHtml}
    <div class="sec-card">
      <div class="sec-accent${sec.compliance?' compliance':''}"></div>
      <div class="sec-head">
        <div class="sec-title-row">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title">${esc(sec.title)}</span>
          ${sec.compliance?'<span class="cbadge">Compliance</span>':''}
        </div>
        <div class="prog-row"><div class="prog-track"><div class="prog-fill" id="s-pf" style="width:${pct}%"></div></div><span class="prog-label" id="s-pl">${done}/${ids.length}</span></div>
      </div>
      ${sec.compliance&&sec.complianceNote?`<div class="cn-bar"><span>⚠️</span><span>${esc(sec.complianceNote)}</span></div>`:''}
      ${sec.note?`<div class="note-bar">${esc(sec.note)}</div>`:''}
      ${scripts?`<div class="scripts-area">${scripts}</div>`:''}
      <div class="confirms"><div class="confirms-label">Confirm</div><div class="conf-grid${solo?' solo':''}">${confirms}</div></div>
    </div>`;

  const prev=data[curIdx-1];const next=data[curIdx+1];
  bot.innerHTML=`<div class="bot-nav-inner">
    <button class="nav-btn prev-btn" onclick="goTo(${curIdx-1})" ${!prev?'disabled':''}>← ${prev?esc(prev.title):''}</button>
    <div class="nav-mid"><div class="nav-pos">${curIdx+1} / ${data.length}</div></div>
    <button class="nav-btn next-btn" onclick="goTo(${curIdx+1})" ${!next?'disabled':''}>${next?esc(next.title):''} →</button>
  </div>`;

  setTimeout(()=>{const dot=document.getElementById('sn-'+curIdx);if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
  updateXP();
}

function boot(){lastRank=getRank(calcTotalXP());render();updateXP();}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/guide/sw.js').catch(()=>{});
if(sessionStorage.getItem('pcs_auth')==='1')boot();
</script>
