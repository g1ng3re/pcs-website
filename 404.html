<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found · Property Clinic Solutions</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/assets/logos/pcs-favicon.svg" />
<link rel="icon" href="/assets/favicon/favicon.ico" sizes="any" />
<meta name="theme-color" content="#002AB1" />
<style>
  html, body { margin: 0; height: 100%; background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #0b1437; }
  .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 24px; box-sizing: border-box; }
  img { height: 38px; margin-bottom: 32px; }
  .code { font-size: 14px; letter-spacing: .14em; text-transform: uppercase; color: #002AB1; font-weight: 700; margin: 0 0 12px; }
  h1 { font-size: clamp(28px, 5vw, 42px); line-height: 1.1; margin: 0 0 14px; letter-spacing: -.02em; }
  p { font-size: 17px; line-height: 1.55; color: #475069; max-width: 520px; margin: 0 0 28px; }
  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  a.btn { display: inline-block; text-decoration: none; font-weight: 700; font-size: 15px; padding: 13px 22px; border-radius: 10px; }
  a.primary { background: #002AB1; color: #fff; }
  a.ghost { background: #fff; color: #002AB1; border: 1.5px solid rgba(0,42,177,.25); }
</style>
</head>
<body>
  <div class="wrap">
    <a href="/"><img src="/assets/logos/pcs-logo-horizontal.svg" alt="Property Clinic Solutions" /></a>
    <p class="code">Error 404</p>
    <h1>We could not find that page.</h1>
    <p>The page may have moved or the link may be out of date. Let us point you back in the right direction.</p>
    <div class="btns">
      <a class="btn primary" href="/">Back to home</a>
      <a class="btn ghost" href="/contact">Contact us</a>
    </div>
  </div>
</body>
</html>
